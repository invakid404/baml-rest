name: bamlfuzz nightly

on:
  schedule:
    # 03:17 UTC nightly — off the :00 mark so we don't queue behind the
    # crowd of cron jobs that fire on the hour.
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: Run mode (fuzz uses Go's testing.F + corpus persistence; rapid uses the property-based oracles)
        type: choice
        options: [fuzz, rapid]
        default: fuzz
      seed:
        description: BAMLFUZZ_SEED override (defaults to github.run_id; rapid mode + the fuzz-mode Static oracle cell)
        type: string
        required: false
      dynamic_cases:
        description: Rapid-mode cases per preserve mode (default 50)
        type: string
        required: false
        default: "50"
      static_batches:
        description: Static rapid batches; used by both rapid mode and the fuzz-mode Static oracle cell (default 10)
        type: string
        required: false
        default: "10"
      invalid_cases:
        description: Rapid-mode invalid-input cases per oracle (default 50)
        type: string
        required: false
        default: "50"
      streaming_cases:
        description: Rapid-mode streaming cases per preserve mode (default 50)
        type: string
        required: false
        default: "50"
      fuzztime:
        description: Fuzz-mode duration per target (default 15m; each target runs in its own matrix cell in parallel)
        type: string
        required: false
        default: "15m"

concurrency:
  group: bamlfuzz-nightly
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  GO_VERSION: "1.26.3"

jobs:
  get-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Build version matrix
        id: set
        # The fuzz matrix expands the prior single-version nightly to
        # every pinned BAML version + the latest. Pinned versions
        # exercise older adapter shapes (pre-0.219 lacks BuildRequest,
        # for example); the latest catches regressions against the
        # newest BAML. Each version × unary-server combination gets its
        # own corpus, so an adapter-specific failure mode persists in
        # the corpus that triggered it; newer-version draws cannot
        # crowd it out across cells.
        env:
          MODE: ${{ github.event.inputs.mode || 'fuzz' }}
        run: |
          matrix=$(jq --arg mode "$MODE" -c '{
            "baml-version": ([.pinned[], .latest] | unique),
            "unary-server": [false, true],
            "target": (if $mode == "rapid"
                       then ["FuzzBamlfuzzStatic"]
                       else ["FuzzBamlfuzzStatic",
                             "FuzzBamlfuzzDynamic",
                             "FuzzBamlfuzzInvalidDynamic",
                             "FuzzBamlfuzzInvalidJSONCoercion",
                             "FuzzBamlfuzzStreaming"]
                       end)
          }' integration/baml_versions.json)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  warm-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Job-level so the Docker Hub login step's own `if:` can read it — a
      # step-level env is not reliably in scope for that step's own `if:`,
      # which would skip the login and leave the cold pulls unauthenticated.
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    # Single prebuild that resolves the base-image digests, pulls each one
    # ONCE (authenticated), saves it to a tarball, and hands the set to the
    # fuzz matrix as a per-run artifact. This replaces the per-cell anonymous
    # Docker Hub pulls that bursted the shared GitHub-runner IP pool against
    # Docker Hub's rate limit and surfaced as "registry-1.docker.io ...
    # context deadline exceeded" container-setup flakes (#447). The fuzz cells
    # `docker load` the tarballs and never touch Docker Hub — so the Docker
    # Hub login now lives here, not per cell. Same base set as
    # integration-tests.yml; no rust (the fuzz job never builds cffi).
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Log in to Docker Hub
        # Authenticated Docker Hub pulls get a much higher rate limit than
        # anonymous pulls off the shared GitHub-runner IP pool (#447). This is
        # the ONLY Docker Hub login in this workflow — the fuzz cells just
        # `docker load` the warmed tarballs — so it runs here, before digest
        # resolution and the cold pulls below.
        #
        # secrets.* can't be referenced directly in a step `if:`, so gate on
        # the job-level DOCKERHUB_USERNAME env (set above) — the step skips
        # cleanly on forks / when the secret is absent instead of running
        # login-action with empty credentials.
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve base-image digests
        id: resolve
        # Resolve each floating tag to its current registry index digest so the
        # cache key tracks image CONTENT, not the mutable tag, and so the pull
        # below is by immutable digest (no tag float between resolve and pull).
        run: |
          set -euo pipefail
          for entry in \
            "node:node:22-bookworm" \
            "debian:debian:bookworm-slim" \
            "golang:golang:1.26.3-alpine" \
            "alpine:alpine:3.19"; do
            key="${entry%%:*}"
            ref="${entry#*:}"
            digest=$(docker buildx imagetools inspect "$ref" --format '{{.Manifest.Digest}}')
            echo "$key=$digest" >> "$GITHUB_OUTPUT"
            echo "resolved $ref -> $digest"
          done

      # Per-image cross-run caches keyed on the resolved digest: a bump to one
      # tag re-pulls only that image. On a hit the tarball is restored to disk
      # and the pull step skips it.
      - name: Cache node:22-bookworm tarball
        id: cache-node
        uses: actions/cache@v5.0.5
        with:
          path: warm-images/node.tar
          key: warm-image-${{ runner.os }}-node-${{ steps.resolve.outputs.node }}
      - name: Cache debian:bookworm-slim tarball
        id: cache-debian
        uses: actions/cache@v5.0.5
        with:
          path: warm-images/debian.tar
          key: warm-image-${{ runner.os }}-debian-${{ steps.resolve.outputs.debian }}
      - name: Cache golang:1.26.3-alpine tarball
        id: cache-golang
        uses: actions/cache@v5.0.5
        with:
          path: warm-images/golang.tar
          key: warm-image-${{ runner.os }}-golang-${{ steps.resolve.outputs.golang }}
      - name: Cache alpine:3.19 tarball
        id: cache-alpine
        uses: actions/cache@v5.0.5
        with:
          path: warm-images/alpine.tar
          key: warm-image-${{ runner.os }}-alpine-${{ steps.resolve.outputs.alpine }}

      - name: Pull and save base images
        # For each cache miss, pull by immutable digest and tag to the exact
        # tag the Dockerfiles reference, so testcontainers' tag-based `FROM`
        # reuses the loaded image with no registry lookup, then `docker save` a
        # raw tar (Actions compresses the artifact/cache). Cache hits already
        # have the tar on disk from the restore above.
        env:
          NODE_DIGEST: ${{ steps.resolve.outputs.node }}
          DEBIAN_DIGEST: ${{ steps.resolve.outputs.debian }}
          GOLANG_DIGEST: ${{ steps.resolve.outputs.golang }}
          ALPINE_DIGEST: ${{ steps.resolve.outputs.alpine }}
          NODE_HIT: ${{ steps.cache-node.outputs.cache-hit }}
          DEBIAN_HIT: ${{ steps.cache-debian.outputs.cache-hit }}
          GOLANG_HIT: ${{ steps.cache-golang.outputs.cache-hit }}
          ALPINE_HIT: ${{ steps.cache-alpine.outputs.cache-hit }}
        run: |
          set -euo pipefail
          mkdir -p warm-images

          warm_tag() {
            local tag="$1" digest="$2" tarfile="$3" hit="$4"
            if [ "$hit" = "true" ] && [ -f "warm-images/$tarfile" ]; then
              echo "cache hit: $tag ($tarfile)"
              return
            fi
            local repo="${tag%%:*}"
            echo "pulling ${repo}@${digest} -> ${tag}"
            docker pull "${repo}@${digest}"
            docker tag "${repo}@${digest}" "$tag"
            docker save "$tag" -o "warm-images/$tarfile"
          }

          warm_tag "node:22-bookworm"     "$NODE_DIGEST"   "node.tar"   "$NODE_HIT"
          warm_tag "debian:bookworm-slim" "$DEBIAN_DIGEST" "debian.tar" "$DEBIAN_HIT"
          warm_tag "golang:1.26.3-alpine" "$GOLANG_DIGEST" "golang.tar" "$GOLANG_HIT"
          warm_tag "alpine:3.19"          "$ALPINE_DIGEST" "alpine.tar" "$ALPINE_HIT"

          ls -lh warm-images/

      - name: Upload warm images
        uses: actions/upload-artifact@v7.0.1
        with:
          name: warm-images-${{ github.run_id }}
          path: warm-images/*.tar
          if-no-files-found: error
          retention-days: 1

  fuzz:
    needs: [get-versions, warm-images]
    runs-on: ubuntu-latest
    # Each matrix cell runs ONE fuzz target via the `target` axis.
    # Budget per cell:
    #   - setup: 1 × ~10m TestMain (Docker env boot, runs BEFORE m.Run())
    #   - fuzz:  1 × FUZZTIME (default 15m; Go hard-caps at -timeout 80m)
    #   - corpus restore + Go install + safety margin = ~5m
    #   - upload corpus + sticky comment + post steps = ~5m
    #   Worst case: ~10m setup + 80m Go timeout + ~5m post = ~95m.
    # The 105m cap sits above that so Go's -timeout fires first on a
    # hang, leaving room for post-steps (corpus upload, sticky issue
    # comment) to complete before Actions kills the runner.
    timeout-minutes: 105
    permissions:
      contents: read
      actions: read
      issues: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.get-versions.outputs.matrix) }}
    env:
      BAML_VERSION: ${{ matrix.baml-version }}
      UNARY_SERVER: ${{ matrix.unary-server }}
      BAML_REST_HTTP_CLIENT: nethttp
      BAMLFUZZ_KEEP_ARTIFACTS: "1"
      MODE: ${{ github.event.inputs.mode || 'fuzz' }}
      FUZZTIME: ${{ github.event.inputs.fuzztime || '15m' }}
      # Oracle knobs. BAMLFUZZ_STATIC_BATCHES is respected in fuzz mode
      # too — the Static step routes through TestBamlfuzzStaticOracle
      # under -run. The rest apply in rapid mode only (the -fuzz step
      # ignores them). Kept addressable via dispatch inputs so a manual
      # run can mix-and-match.
      BAMLFUZZ_DYNAMIC_CASES: ${{ github.event.inputs.dynamic_cases || '50' }}
      BAMLFUZZ_STATIC_BATCHES: ${{ github.event.inputs.static_batches || '10' }}
      BAMLFUZZ_INVALID_CASES: ${{ github.event.inputs.invalid_cases || '50' }}
      BAMLFUZZ_STREAMING_CASES: ${{ github.event.inputs.streaming_cases || '50' }}
      BAMLFUZZ_SEED: ${{ github.event.inputs.seed || github.run_id }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Free runner disk before Docker image load
        # GitHub-hosted runners start with ~14 GiB free, which the static
        # oracle's per-batch baml-rest image builds exhaust ("no space left
        # on device"). Reclaim the preinstalled toolchains/images we never
        # use BEFORE the warm tarballs are loaded — docker-images:true is
        # only safe here because our warm base images aren't loaded yet, and
        # tool-cache:false keeps setup-go's tool cache intact.
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Download warm base images
        # Base images are pulled once by the warm-images job and handed over as
        # a per-run artifact; this cell only loads them — no Docker Hub login,
        # no pull (#447).
        uses: actions/download-artifact@v8.0.1
        with:
          name: warm-images-${{ github.run_id }}
          path: warm-images

      - name: Load warm base images
        # `docker load` the warmed tarballs before the go-test steps so
        # testcontainers' tag-based `FROM` builds reuse them locally instead of
        # pulling from Docker Hub.
        run: |
          set -euo pipefail
          for tar in warm-images/*.tar; do
            echo "loading $tar"
            docker load -i "$tar"
          done
          docker image ls

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Restore corpus from prior nightly (target-scoped)
        # FuzzBamlfuzzStatic and FuzzBamlfuzzStreaming both run through
        # their oracle test under -run (see the Static/Streaming steps
        # below), not Go's native fuzz engine, so they have no fuzz
        # corpus — skip corpus restore/upload for those targets.
        if: ${{ env.MODE == 'fuzz' && !contains(fromJSON('["FuzzBamlfuzzStatic", "FuzzBamlfuzzStreaming"]'), matrix.target) }}
        id: restore-target
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: bamlfuzz-corpus-${{ matrix.baml-version }}-${{ matrix.unary-server }}-${{ matrix.target }}
        run: |
          set -euo pipefail
          mkdir -p adapters/common/codegen/testdata/bamlfuzz/.fuzzcache
          candidates=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow=bamlfuzz-nightly.yml \
            --status=completed \
            --branch=master \
            --limit=10 \
            --json databaseId \
            --jq '.[].databaseId')

          restored=""
          for run_id in $candidates; do
            has_artifact=$(gh api --paginate \
              "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/artifacts" \
              --jq "[.artifacts[] | select(.name == \"$ARTIFACT_NAME\")] | length" \
              | awk '{s+=$1} END {print s+0}')
            if [ "$has_artifact" -gt 0 ]; then
              gh run download "$run_id" --repo "$GITHUB_REPOSITORY" \
                --name "$ARTIFACT_NAME" \
                --dir adapters/common/codegen/testdata/bamlfuzz/.fuzzcache
              echo "restored corpus from run $run_id"
              restored="$run_id"
              break
            fi
          done

          if [ -z "$restored" ]; then
            echo "no recent completed run had artifact $ARTIFACT_NAME; starting fresh"
          fi
          echo "restored=${restored:-}" >> "$GITHUB_OUTPUT"

      # One-time transition fallback: the prior nightly on master uploaded
      # corpus under the legacy unscoped name (without -$target suffix).
      # Once the first target-scoped nightly succeeds, this step becomes a
      # no-op and can be removed in a future PR.
      - name: Fallback restore from legacy unscoped corpus
        if: ${{ env.MODE == 'fuzz' && !contains(fromJSON('["FuzzBamlfuzzStatic", "FuzzBamlfuzzStreaming"]'), matrix.target) && steps.restore-target.outputs.restored == '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: bamlfuzz-corpus-${{ matrix.baml-version }}-${{ matrix.unary-server }}
        run: |
          set -euo pipefail
          mkdir -p adapters/common/codegen/testdata/bamlfuzz/.fuzzcache
          candidates=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow=bamlfuzz-nightly.yml \
            --status=completed \
            --branch=master \
            --limit=10 \
            --json databaseId \
            --jq '.[].databaseId')

          restored=""
          for run_id in $candidates; do
            has_artifact=$(gh api --paginate \
              "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/artifacts" \
              --jq "[.artifacts[] | select(.name == \"$ARTIFACT_NAME\")] | length" \
              | awk '{s+=$1} END {print s+0}')
            if [ "$has_artifact" -gt 0 ]; then
              gh run download "$run_id" --repo "$GITHUB_REPOSITORY" \
                --name "$ARTIFACT_NAME" \
                --dir adapters/common/codegen/testdata/bamlfuzz/.fuzzcache
              echo "restored legacy corpus from run $run_id"
              restored="$run_id"
              break
            fi
          done

          if [ -z "$restored" ]; then
            echo "no recent completed run had artifact $ARTIFACT_NAME; starting fresh"
          fi

      - name: Fuzz ${{ matrix.target }} (BAML ${{ matrix.baml-version }}, unary=${{ matrix.unary-server }})
        # FuzzBamlfuzzStatic and FuzzBamlfuzzStreaming are handled by the
        # oracle steps below, not the native fuzz engine — see those steps
        # for why.
        if: ${{ env.MODE == 'fuzz' && !contains(fromJSON('["FuzzBamlfuzzStatic", "FuzzBamlfuzzStreaming"]'), matrix.target) }}
        # Each matrix cell runs exactly one fuzz target via the `target`
        # axis. BAMLFUZZ_KEEP_ARTIFACTS is forced off; the success-path
        # envelope dump writes to _artifacts/fuzz.json which races under
        # parallel fuzz workers. Failures still dump unconditionally via
        # failAndDump / failStaticAndDump / failAndDumpInvalid.
        env:
          BAMLFUZZ_KEEP_ARTIFACTS: ""
        run: |
          go test -tags=integration,subprocess -v -count=1 -p 1 -timeout 80m \
            -run='^$' \
            -fuzz='^${{ matrix.target }}$' \
            -fuzztime="${FUZZTIME}" \
            ./integration \
            -test.fuzzcachedir="$(pwd)/adapters/common/codegen/testdata/bamlfuzz/.fuzzcache"

      - name: Static oracle (-run, no fuzz watchdog) (BAML ${{ matrix.baml-version }}, unary=${{ matrix.unary-server }})
        if: ${{ env.MODE == 'fuzz' && matrix.target == 'FuzzBamlfuzzStatic' }}
        # FuzzBamlfuzzStatic builds a full Docker env per iteration
        # (~30-60s: npx baml generate + go build + container start), but
        # Go's fuzz engine hard-caps every input at a 10s watchdog
        # (internal/fuzz/worker.go → panic("deadlocked!")), so -fuzz
        # always overruns and crashes this target on its first exec with
        # exit status 2 (the worker's stderr is wired to /dev/null, so the
        # panic never surfaces). Run the identical schema-gen + build +
        # REST + oracle path through TestBamlfuzzStaticOracle under -run
        # instead, which has no per-input watchdog.
        #
        # BAMLFUZZ_STATIC_BATCHES (job env, default 10) scales the rapid
        # batches; 10 × staticCasesPerBatch (5) = 50 cases, matching the
        # ~50-case budget the other targets explore per nightly cell.
        # No corpus restore/upload: -run does not use the fuzz corpus.
        #
        # BAMLFUZZ_STATIC_DOCKER_PRUNE prunes dangling images + BuildKit
        # cache between static envs so this target's many full baml-rest
        # builds don't accumulate and exhaust the runner disk. Scoped to
        # this step only — the harness no-ops without it.
        env:
          BAMLFUZZ_STATIC_DOCKER_PRUNE: "1"
        run: |
          go test -tags=integration,subprocess -v -count=1 -p 1 -timeout 80m \
            -run='TestBamlfuzzStaticOracle' \
            ./integration

      - name: Streaming oracle (-run, no fuzz watchdog) (BAML ${{ matrix.baml-version }}, unary=${{ matrix.unary-server }})
        if: ${{ env.MODE == 'fuzz' && matrix.target == 'FuzzBamlfuzzStreaming' }}
        # FuzzBamlfuzzStreaming is incompatible with Go's native fuzz
        # engine for the same reason as FuzzBamlfuzzStatic, but more
        # intermittently: every fuzz exec is wrapped in a hard 10s
        # watchdog (internal/fuzz/worker.go → panic("deadlocked!")), and
        # a single streaming exec drives FOUR sequential calls (dynclient
        # stream, REST SSE stream, REST NDJSON stream, unary cross-check),
        # each with a 30s context budget plus chunked SSE/NDJSON draining.
        # Under fuzz load that routinely overruns 10s; the worker panics
        # and dies, and because the fuzz worker is a fresh process that
        # re-runs TestMain (a ~90s Docker env boot), the coordinator's
        # restart handshake then fails with "fuzzing process terminated
        # without fuzzing: EOF". The 0.219.0/unary=false cell hit this on
        # every recent nightly. Run the identical schema-gen + streaming +
        # oracle path through TestBamlfuzzStreamingOracle under -run
        # instead, which has no per-input watchdog.
        #
        # BAMLFUZZ_STREAMING_CASES (job env, default 50) scales the rapid
        # streaming cases per preserve mode, matching the ~50-case budget
        # the native fuzz targets explore per nightly cell. No corpus
        # restore/upload: -run does not use the fuzz corpus.
        run: |
          go test -tags=integration,subprocess -v -count=1 -p 1 -timeout 80m \
            -run='^TestBamlfuzzStreamingOracle$' \
            ./integration

      - name: Run bamlfuzz oracles — rapid mode (BAML ${{ matrix.baml-version }}, unary=${{ matrix.unary-server }})
        if: ${{ env.MODE == 'rapid' && matrix.target == 'FuzzBamlfuzzStatic' }}
        # Gate: rapid mode runs all 5 oracle tests in one `go test`
        # invocation (shared TestMain), so it is target-independent.
        # Pick one representative target value to run rapid exactly
        # once per version-unary pair.
        #
        # `subprocess` matches the normal server deployment path (server +
        # cmd/worker go-plugin), same as integration-tests.yml. -p 1 keeps
        # the integration env setup serial; the oracles share state.
        #
        # BAMLFUZZ_RAPID_STRESS does NOT belong here: raiseRapidChecksFloor
        # lives in the adapters/common/codegen/bamlfuzz package, which this
        # integration step never invokes. The env is set on the dedicated
        # bamlfuzz-package-stress job instead.
        run: |
          go test -tags=integration,subprocess -v -count=1 -p 1 -timeout 80m \
            -run='^TestBamlfuzz(Static|Dynamic|Streaming)Oracle$|^TestBamlfuzzInvalid(Dynamic|JSONCoercion)$' ./integration/...

      - name: Upload corpus for next nightly
        # Static and Streaming run via -run (no fuzz corpus), so nothing
        # to persist for those targets.
        if: ${{ always() && env.MODE == 'fuzz' && !contains(fromJSON('["FuzzBamlfuzzStatic", "FuzzBamlfuzzStreaming"]'), matrix.target) }}
        # Uploaded on every run (including failures) so a fuzz failure
        # the engine already wrote to the cache survives into the next
        # restore pass — the corpus is the only mechanism that lets the
        # fuzzer keep building on prior progress.
        uses: actions/upload-artifact@v7.0.1
        with:
          name: bamlfuzz-corpus-${{ matrix.baml-version }}-${{ matrix.unary-server }}-${{ matrix.target }}
          path: adapters/common/codegen/testdata/bamlfuzz/.fuzzcache/
          if-no-files-found: ignore
          # The path is a dot-directory; without this flag upload-artifact@v7
          # treats its contents as hidden and silently uploads nothing, so the
          # corpus would never persist across runs.
          include-hidden-files: true
          retention-days: 90

      - name: Upload replay artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: bamlfuzz-envelopes-${{ matrix.baml-version }}-${{ matrix.unary-server }}-${{ matrix.target }}-${{ github.run_id }}
          path: adapters/common/codegen/testdata/bamlfuzz/*/_artifacts/
          if-no-files-found: ignore

      - name: Comment on sticky tracking issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: "bamlfuzz nightly status"
          BAML: ${{ matrix.baml-version }}
          UNARY: ${{ matrix.unary-server }}
          TARGET: ${{ matrix.target }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          # Find existing open issue (first match by title).
          ISSUE_NUMBER=$(gh issue list --repo "$REPO" --state open \
            --search "in:title \"$TITLE\"" --json number --jq '.[0].number // empty')
          # Create the sticky stub if none exists. gh issue create prints
          # the URL on stdout; we strip the trailing path segment for the
          # number.
          if [ -z "$ISSUE_NUMBER" ]; then
            ISSUE_URL=$(gh issue create --repo "$REPO" \
              --title "$TITLE" \
              --body "Sticky tracking issue for bamlfuzz nightly failures. Each failed run appends a comment here. See #372 for the workflow design.")
            ISSUE_NUMBER="${ISSUE_URL##*/}"
          fi
          {
            echo "## bamlfuzz nightly failed (run ${RUN_ID})"
            echo
            echo "Mode: \`${MODE}\`"
            echo "Matrix: baml-version=${BAML}, unary-server=${UNARY}, target=${TARGET}"
            echo "Workflow: ${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
            echo "Envelope artifact: bamlfuzz-envelopes-${BAML}-${UNARY}-${TARGET}-${RUN_ID}"
            if [ "${MODE}" = "fuzz" ] && [ "${TARGET}" = "FuzzBamlfuzzStatic" ]; then
              # Static runs through TestBamlfuzzStaticOracle under -run
              # (FuzzBamlfuzzStatic is incompatible with go test -fuzz's
              # hardcoded 10s/input watchdog), so there is no fuzz corpus
              # and the repro is the oracle command.
              echo
              echo "This cell ran the Static oracle via \`-run\` (FuzzBamlfuzzStatic overruns Go's 10s/input fuzz watchdog). Repro:"
              echo
              echo '```'
              echo "BAML_VERSION=${BAML} UNARY_SERVER=${UNARY} BAMLFUZZ_SEED=${BAMLFUZZ_SEED} BAMLFUZZ_STATIC_BATCHES=${BAMLFUZZ_STATIC_BATCHES} go test -tags=integration,subprocess -run='TestBamlfuzzStaticOracle' ./integration -count=1 -p 1"
              echo '```'
            elif [ "${MODE}" = "fuzz" ] && [ "${TARGET}" = "FuzzBamlfuzzStreaming" ]; then
              # Streaming runs through TestBamlfuzzStreamingOracle under
              # -run for the same reason as Static: a single streaming fuzz
              # exec drives four sequential calls that routinely overrun
              # Go's 10s/input fuzz watchdog. No fuzz corpus; the repro is
              # the oracle command.
              echo
              echo "This cell ran the Streaming oracle via \`-run\` (FuzzBamlfuzzStreaming overruns Go's 10s/input fuzz watchdog). Repro:"
              echo
              echo '```'
              echo "BAML_VERSION=${BAML} UNARY_SERVER=${UNARY} BAMLFUZZ_SEED=${BAMLFUZZ_SEED} BAMLFUZZ_STREAMING_CASES=${BAMLFUZZ_STREAMING_CASES} go test -tags=integration,subprocess -run='^TestBamlfuzzStreamingOracle\$' ./integration -count=1 -p 1"
              echo '```'
            elif [ "${MODE}" = "fuzz" ]; then
              echo "Corpus artifact: bamlfuzz-corpus-${BAML}-${UNARY}-${TARGET}"
              echo
              echo "This cell ran fuzz target \`${TARGET}\`. Repro (from repo root, after downloading the corpus artifact and extracting under adapters/common/codegen/testdata/bamlfuzz/.fuzzcache/):"
              echo
              echo '```'
              echo "BAML_VERSION=${BAML} UNARY_SERVER=${UNARY} go test -tags=integration,subprocess -run='^\$' -fuzz='^${TARGET}\$' -fuzztime=30s ./integration -test.fuzzcachedir=\$(pwd)/adapters/common/codegen/testdata/bamlfuzz/.fuzzcache"
              echo '```'
            else
              echo
              echo "Repro:"
              echo
              echo '```'
              echo "BAML_VERSION=${BAML} UNARY_SERVER=${UNARY} BAMLFUZZ_SEED=${BAMLFUZZ_SEED} BAMLFUZZ_DYNAMIC_CASES=${BAMLFUZZ_DYNAMIC_CASES} BAMLFUZZ_STATIC_BATCHES=${BAMLFUZZ_STATIC_BATCHES} BAMLFUZZ_INVALID_CASES=${BAMLFUZZ_INVALID_CASES} BAMLFUZZ_STREAMING_CASES=${BAMLFUZZ_STREAMING_CASES} go test -tags=integration,subprocess -run='^TestBamlfuzz(Static|Dynamic|Streaming)Oracle\$|^TestBamlfuzzInvalid(Dynamic|JSONCoercion)\$' ./integration -count=1"
              echo '```'
            fi
          } | gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body-file -

  # Stress invariants for the bamlfuzz Go package itself. raiseRapidChecksFloor
  # (adapters/common/codegen/bamlfuzz/union_test.go) is opt-in via
  # BAMLFUZZ_RAPID_STRESS and lives in the bamlfuzz PACKAGE, not ./integration,
  # so the rapid-mode integration step in the fuzz job can never trip it.
  # Running the package's union tests under the gated 5000-check floor surfaces
  # generator regressions like the recursion-cap fallback Codex found at 1315
  # cases. The floor's defer-restore of the rapid checks count is package-local
  # and this run is non-race with -count=1, so the floor does not compound the
  # way it would under the unit-tests CI's -race -count=100.
  #
  # These tests are pure Go: they never read BAML_VERSION or UNARY_SERVER and
  # are not BAML-version dependent, so they run as one standalone cell
  # outside the version matrix. Keeping them off the matrix means there is
  # no matrix.baml-version literal to drift when Renovate bumps
  # integration/baml_versions.json. Gated on the same rapid-mode condition the
  # fuzz job's MODE env uses, so it runs only on a manual rapid dispatch.
  bamlfuzz-package-stress:
    name: bamlfuzz package stress invariants
    if: ${{ (github.event.inputs.mode || 'fuzz') == 'rapid' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run bamlfuzz package stress invariants
        env:
          BAMLFUZZ_RAPID_STRESS: "1"
        working-directory: adapters/common
        run: |
          GOWORK=off go test -count=1 -timeout 80m ./codegen/bamlfuzz/...
