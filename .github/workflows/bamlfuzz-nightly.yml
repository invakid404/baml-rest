name: bamlfuzz nightly

on:
  schedule:
    # 03:17 UTC nightly — off the :00 mark so we don't queue behind the
    # crowd of cron jobs that fire on the hour.
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: Run mode (fuzz uses Go's testing.F + corpus persistence; rapid uses the property-based oracles)
        type: choice
        options: [fuzz, rapid]
        default: fuzz
      seed:
        description: BAMLFUZZ_SEED override (defaults to github.run_id; rapid mode only)
        type: string
        required: false
      dynamic_cases:
        description: Rapid-mode cases per preserve mode (default 50)
        type: string
        required: false
        default: "50"
      static_batches:
        description: Rapid-mode static batches (default 10)
        type: string
        required: false
        default: "10"
      invalid_cases:
        description: Rapid-mode invalid-input cases per oracle (default 50)
        type: string
        required: false
        default: "50"
      streaming_cases:
        description: Rapid-mode streaming cases per preserve mode (default 50)
        type: string
        required: false
        default: "50"
      fuzztime:
        description: Fuzz-mode duration per target (default 15m; each target runs in its own matrix cell in parallel)
        type: string
        required: false
        default: "15m"

concurrency:
  group: bamlfuzz-nightly
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  GO_VERSION: "1.26.3"

jobs:
  get-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build version matrix
        id: set
        # The fuzz matrix expands the prior single-version nightly to
        # every pinned BAML version + the latest. Pinned versions
        # exercise older adapter shapes (pre-0.219 lacks BuildRequest,
        # for example); the latest catches regressions against the
        # newest BAML. Each version × unary-server combination gets its
        # own corpus, so an adapter-specific failure mode persists in
        # the corpus that triggered it; newer-version draws cannot
        # crowd it out across cells.
        env:
          MODE: ${{ github.event.inputs.mode || 'fuzz' }}
        run: |
          matrix=$(jq --arg mode "$MODE" -c '{
            "baml-version": ([.pinned[], .latest] | unique),
            "unary-server": [false, true],
            "target": (if $mode == "rapid"
                       then ["FuzzBamlfuzzStatic"]
                       else ["FuzzBamlfuzzStatic",
                             "FuzzBamlfuzzDynamic",
                             "FuzzBamlfuzzInvalidDynamic",
                             "FuzzBamlfuzzInvalidJSONCoercion",
                             "FuzzBamlfuzzStreaming"]
                       end)
          }' integration/baml_versions.json)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  fuzz:
    needs: get-versions
    runs-on: ubuntu-latest
    # Each matrix cell runs ONE fuzz target via the `target` axis.
    # Budget per cell:
    #   - setup: 1 × ~10m TestMain (Docker env boot, runs BEFORE m.Run())
    #   - fuzz:  1 × FUZZTIME (default 15m; Go hard-caps at -timeout 80m)
    #   - corpus restore + Go install + safety margin = ~5m
    #   - upload corpus + sticky comment + post steps = ~5m
    #   Worst case: ~10m setup + 80m Go timeout + ~5m post = ~95m.
    # The 105m cap sits above that so Go's -timeout fires first on a
    # hang, leaving room for post-steps (corpus upload, sticky issue
    # comment) to complete before Actions kills the runner.
    timeout-minutes: 105
    permissions:
      contents: read
      actions: read
      issues: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.get-versions.outputs.matrix) }}
    env:
      BAML_VERSION: ${{ matrix.baml-version }}
      UNARY_SERVER: ${{ matrix.unary-server }}
      BAML_REST_HTTP_CLIENT: nethttp
      BAMLFUZZ_KEEP_ARTIFACTS: "1"
      MODE: ${{ github.event.inputs.mode || 'fuzz' }}
      FUZZTIME: ${{ github.event.inputs.fuzztime || '15m' }}
      # Rapid-mode knobs: ignored by the fuzz-mode step. Kept addressable
      # via dispatch inputs so a manual run can mix-and-match.
      BAMLFUZZ_DYNAMIC_CASES: ${{ github.event.inputs.dynamic_cases || '50' }}
      BAMLFUZZ_STATIC_BATCHES: ${{ github.event.inputs.static_batches || '10' }}
      BAMLFUZZ_INVALID_CASES: ${{ github.event.inputs.invalid_cases || '50' }}
      BAMLFUZZ_STREAMING_CASES: ${{ github.event.inputs.streaming_cases || '50' }}
      BAMLFUZZ_SEED: ${{ github.event.inputs.seed || github.run_id }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Restore corpus from prior nightly (target-scoped)
        if: ${{ env.MODE == 'fuzz' }}
        id: restore-target
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: bamlfuzz-corpus-${{ matrix.baml-version }}-${{ matrix.unary-server }}-${{ matrix.target }}
        run: |
          set -euo pipefail
          mkdir -p adapters/common/codegen/testdata/bamlfuzz/.fuzzcache
          prior_run=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow=bamlfuzz-nightly.yml \
            --status=success \
            --branch=master \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')
          if [ -z "$prior_run" ]; then
            echo "no prior successful nightly run; starting with empty corpus"
            exit 0
          fi
          gh run download "$prior_run" --repo "$GITHUB_REPOSITORY" \
            --name "$ARTIFACT_NAME" \
            --dir adapters/common/codegen/testdata/bamlfuzz/.fuzzcache

      # One-time transition fallback: the prior nightly on master uploaded
      # corpus under the legacy unscoped name (without -$target suffix).
      # Once the first target-scoped nightly succeeds, this step becomes a
      # no-op and can be removed in a future PR.
      - name: Fallback restore from legacy unscoped corpus
        if: ${{ env.MODE == 'fuzz' && steps.restore-target.outcome != 'success' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: bamlfuzz-corpus-${{ matrix.baml-version }}-${{ matrix.unary-server }}
        run: |
          set -euo pipefail
          mkdir -p adapters/common/codegen/testdata/bamlfuzz/.fuzzcache
          prior_run=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow=bamlfuzz-nightly.yml \
            --status=success \
            --branch=master \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')
          if [ -z "$prior_run" ]; then
            echo "no prior successful nightly run; starting with empty corpus"
            exit 0
          fi
          if ! gh run download "$prior_run" --repo "$GITHUB_REPOSITORY" \
              --name "$ARTIFACT_NAME" \
              --dir adapters/common/codegen/testdata/bamlfuzz/.fuzzcache; then
            echo "legacy corpus artifact ${ARTIFACT_NAME} not found; starting fresh"
          fi

      - name: Fuzz ${{ matrix.target }} (BAML ${{ matrix.baml-version }}, unary=${{ matrix.unary-server }})
        if: ${{ env.MODE == 'fuzz' }}
        # Each matrix cell runs exactly one fuzz target via the `target`
        # axis. BAMLFUZZ_KEEP_ARTIFACTS is forced off; the success-path
        # envelope dump writes to _artifacts/fuzz.json which races under
        # parallel fuzz workers. Failures still dump unconditionally via
        # failAndDump / failStaticAndDump / failAndDumpInvalid.
        env:
          BAMLFUZZ_KEEP_ARTIFACTS: ""
        run: |
          go test -tags=integration,subprocess -v -count=1 -p 1 -timeout 80m \
            -run='^$' \
            -fuzz='^${{ matrix.target }}$' \
            -fuzztime="${FUZZTIME}" \
            -fuzzcachedir="$(pwd)/adapters/common/codegen/testdata/bamlfuzz/.fuzzcache" \
            ./integration

      - name: Run bamlfuzz oracles — rapid mode (BAML ${{ matrix.baml-version }}, unary=${{ matrix.unary-server }})
        if: ${{ env.MODE == 'rapid' && matrix.target == 'FuzzBamlfuzzStatic' }}
        # Gate: rapid mode runs all 5 oracle tests in one `go test`
        # invocation (shared TestMain), so it is target-independent.
        # Pick one representative target value to run rapid exactly
        # once per version-unary pair.
        #
        # `subprocess` matches the normal server deployment path (server +
        # cmd/worker go-plugin), same as integration-tests.yml. -p 1 keeps
        # the integration env setup serial; the oracles share state.
        #
        # BAMLFUZZ_RAPID_STRESS does NOT belong here: raiseRapidChecksFloor
        # lives in the adapters/common/codegen/bamlfuzz package, which this
        # integration step never invokes. The env is set on the dedicated
        # bamlfuzz-package-stress job instead.
        run: |
          go test -tags=integration,subprocess -v -count=1 -p 1 -timeout 80m \
            -run='^TestBamlfuzz(Static|Dynamic|Streaming)Oracle$|^TestBamlfuzzInvalid(Dynamic|JSONCoercion)$' ./integration/...

      - name: Upload corpus for next nightly
        if: ${{ always() && env.MODE == 'fuzz' }}
        # Uploaded on every run (including failures) so a fuzz failure
        # the engine already wrote to the cache survives into the next
        # restore pass — the corpus is the only mechanism that lets the
        # fuzzer keep building on prior progress.
        uses: actions/upload-artifact@v7
        with:
          name: bamlfuzz-corpus-${{ matrix.baml-version }}-${{ matrix.unary-server }}-${{ matrix.target }}
          path: adapters/common/codegen/testdata/bamlfuzz/.fuzzcache/
          if-no-files-found: ignore
          retention-days: 90

      - name: Upload replay artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: bamlfuzz-envelopes-${{ matrix.baml-version }}-${{ matrix.unary-server }}-${{ matrix.target }}-${{ github.run_id }}
          path: adapters/common/codegen/testdata/bamlfuzz/*/_artifacts/
          if-no-files-found: ignore

      - name: Comment on sticky tracking issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: "bamlfuzz nightly status"
          BAML: ${{ matrix.baml-version }}
          UNARY: ${{ matrix.unary-server }}
          TARGET: ${{ matrix.target }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          # Find existing open issue (first match by title).
          ISSUE_NUMBER=$(gh issue list --repo "$REPO" --state open \
            --search "in:title \"$TITLE\"" --json number --jq '.[0].number // empty')
          # Create the sticky stub if none exists. gh issue create prints
          # the URL on stdout; we strip the trailing path segment for the
          # number.
          if [ -z "$ISSUE_NUMBER" ]; then
            ISSUE_URL=$(gh issue create --repo "$REPO" \
              --title "$TITLE" \
              --body "Sticky tracking issue for bamlfuzz nightly failures. Each failed run appends a comment here. See #372 for the workflow design.")
            ISSUE_NUMBER="${ISSUE_URL##*/}"
          fi
          {
            echo "## bamlfuzz nightly failed (run ${RUN_ID})"
            echo
            echo "Mode: \`${MODE}\`"
            echo "Matrix: baml-version=${BAML}, unary-server=${UNARY}, target=${TARGET}"
            echo "Workflow: ${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
            echo "Envelope artifact: bamlfuzz-envelopes-${BAML}-${UNARY}-${TARGET}-${RUN_ID}"
            if [ "${MODE}" = "fuzz" ]; then
              echo "Corpus artifact: bamlfuzz-corpus-${BAML}-${UNARY}-${TARGET}"
              echo
              echo "This cell ran fuzz target \`${TARGET}\`. Repro (after downloading the corpus artifact and extracting under adapters/common/codegen/testdata/bamlfuzz/.fuzzcache/):"
              echo
              echo '```'
              echo "BAML_VERSION=${BAML} UNARY_SERVER=${UNARY} go test -tags=integration,subprocess -run='^\$' -fuzz='^${TARGET}\$' -fuzztime=30s -fuzzcachedir=adapters/common/codegen/testdata/bamlfuzz/.fuzzcache ./integration"
              echo '```'
            else
              echo
              echo "Repro:"
              echo
              echo '```'
              echo "BAML_VERSION=${BAML} UNARY_SERVER=${UNARY} BAMLFUZZ_SEED=${BAMLFUZZ_SEED} BAMLFUZZ_DYNAMIC_CASES=${BAMLFUZZ_DYNAMIC_CASES} BAMLFUZZ_STATIC_BATCHES=${BAMLFUZZ_STATIC_BATCHES} BAMLFUZZ_INVALID_CASES=${BAMLFUZZ_INVALID_CASES} BAMLFUZZ_STREAMING_CASES=${BAMLFUZZ_STREAMING_CASES} go test -tags=integration,subprocess -run='^TestBamlfuzz(Static|Dynamic|Streaming)Oracle\$|^TestBamlfuzzInvalid(Dynamic|JSONCoercion)\$' ./integration -count=1"
              echo '```'
            fi
          } | gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body-file -

  # Stress invariants for the bamlfuzz Go package itself. raiseRapidChecksFloor
  # (adapters/common/codegen/bamlfuzz/union_test.go) is opt-in via
  # BAMLFUZZ_RAPID_STRESS and lives in the bamlfuzz PACKAGE, not ./integration,
  # so the rapid-mode integration step in the fuzz job can never trip it.
  # Running the package's union tests under the gated 5000-check floor surfaces
  # generator regressions like the recursion-cap fallback Codex found at 1315
  # cases. The floor's defer-restore of the rapid checks count is package-local
  # and this run is non-race with -count=1, so the floor does not compound the
  # way it would under the unit-tests CI's -race -count=100.
  #
  # These tests are pure Go: they never read BAML_VERSION or UNARY_SERVER and
  # are not BAML-version dependent, so they run as one standalone cell rather
  # than inside the version matrix. Keeping them off the matrix means there is
  # no matrix.baml-version literal to drift when Renovate bumps
  # integration/baml_versions.json. Gated on the same rapid-mode condition the
  # fuzz job's MODE env uses, so it runs only on a manual rapid dispatch.
  bamlfuzz-package-stress:
    name: bamlfuzz package stress invariants
    if: ${{ (github.event.inputs.mode || 'fuzz') == 'rapid' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run bamlfuzz package stress invariants
        env:
          BAMLFUZZ_RAPID_STRESS: "1"
        working-directory: adapters/common
        run: |
          GOWORK=off go test -count=1 -timeout 80m ./codegen/bamlfuzz/...
