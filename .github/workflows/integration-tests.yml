name: Integration Tests

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.3"

jobs:
  get-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3

      - name: Build version matrix
        id: set-matrix
        run: |
          # Build the matrix from baml_versions.json with two cross-cutting
          # exclusions:
          #
          #   1. http-client has no effect on the legacy CallStream path
          #      (BAML_REST_HTTP_CLIENT is only read by the BuildRequest
          #      path through llmhttp). Pin the !buildrequest cells to
          #      nethttp only so auto/fasthttp don't duplicate cycles.
          #
          #   2. BAML versions below 0.219.0 have no BuildRequest API at
          #      all — the adapter gate routes those requests through
          #      CallStream regardless of BAML_REST_USE_BUILD_REQUEST.
          #      Running their buildrequest=true row would just redo the
          #      buildrequest=false work three times (once per
          #      http-client value).
          #
          # The "auto" value exercises the default dispatch path (ALPN
          # probe on HTTPS, fasthttp short-circuit on plain http); the
          # mockllm used in integration tests is plain HTTP so auto and
          # fasthttp hit the same backend, but keeping auto in the
          # matrix guards against accidentally breaking the default-mode
          # wiring.
          matrix=$(jq -c '
            def parseVer: split(".") | map(tonumber);
            def supportsBuildRequest: parseVer | .[0] > 0 or (.[0] == 0 and .[1] >= 219);

            ([.pinned[], .latest] | unique) as $versions
            | {
                "baml-version": $versions,
                "unary-server": [false, true],
                "use-build-request": [false, true],
                "http-client": ["auto", "nethttp", "fasthttp"],
                "exclude": (
                  ($versions | map({"baml-version": ., "use-build-request": false, "http-client": "auto"}))
                  + ($versions | map({"baml-version": ., "use-build-request": false, "http-client": "fasthttp"}))
                  + ($versions | map(select(supportsBuildRequest | not)) | map({"baml-version": ., "use-build-request": true}))
                )
              }
          ' integration/baml_versions.json)
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  warm-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Single prebuild that resolves the base-image digests, pulls each one
    # ONCE (authenticated), saves it to a tarball, and hands the set to every
    # Docker-consuming matrix cell as a per-run artifact. This replaces the
    # per-cell anonymous Docker Hub pulls that bursted the shared
    # GitHub-runner IP pool against Docker Hub's rate limit and surfaced as
    # "registry-1.docker.io ... context deadline exceeded" container-setup
    # flakes (#447). Consuming cells `docker load` the tarballs and never
    # touch Docker Hub — so the Docker Hub login now lives here, not per cell.
    outputs:
      # build-baml-cffi `docker run`s the pinned rust base. `docker save`/`load`
      # does NOT restore repo-digest mappings, so a digest-qualified
      # `rust:bookworm@sha256:...` ref would still hit Docker Hub after a load.
      # The warm job pulls the pinned digest and tags it to this deterministic
      # local alias; build-baml-cffi runs the alias instead of the digest ref.
      rust-alias: ${{ steps.rust.outputs.alias }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3

      - name: Log in to Docker Hub
        # Authenticated Docker Hub pulls get a much higher rate limit than
        # anonymous pulls off the shared GitHub-runner IP pool (#447). This is
        # the ONLY Docker Hub login in this workflow — consuming cells just
        # `docker load` the warmed tarballs — so it runs here, before digest
        # resolution and the cold pulls below.
        #
        # secrets.* can't be referenced directly in a step `if:`, so route the
        # username through step env and gate on that — the step skips cleanly on
        # forks / when the secret is absent instead of running login-action with
        # empty credentials.
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Resolve base-image digests
        id: resolve
        # Resolve each floating tag to its current registry index digest so the
        # cache key tracks image CONTENT, not the mutable tag, and so the pull
        # below is by immutable digest (no tag float between resolve and pull).
        # imagetools inspect queries the registry using the login above.
        run: |
          set -euo pipefail
          for entry in \
            "node:node:22-bookworm" \
            "debian:debian:bookworm-slim" \
            "golang:golang:1.26.3-alpine" \
            "alpine:alpine:3.19"; do
            key="${entry%%:*}"
            ref="${entry#*:}"
            digest=$(docker buildx imagetools inspect "$ref" --format '{{.Manifest.Digest}}')
            echo "$key=$digest" >> "$GITHUB_OUTPUT"
            echo "resolved $ref -> $digest"
          done

      - name: Resolve pinned rust image
        id: rust
        # Single-source the rust base from the Dockerfile FROM pin (same guard
        # as build-baml-cffi) so the warm alias and that job's cache key derive
        # from the same digest. A future digest bump in Dockerfile.tmpl then
        # invalidates the warm cache automatically.
        run: |
          set -euo pipefail
          matches=$(grep -cE '^FROM rust:bookworm@sha256:[0-9a-f]+' cmd/build/Dockerfile.tmpl)
          if [ "$matches" -ne 1 ]; then
            echo "::error file=cmd/build/Dockerfile.tmpl::expected exactly one pinned 'FROM rust:bookworm@sha256:' line, found $matches"
            exit 1
          fi
          image=$(grep -oE 'rust:bookworm@sha256:[0-9a-f]+' cmd/build/Dockerfile.tmpl | head -n1)
          digest=$(printf '%s' "$image" | sed -E 's/.*@sha256://' | cut -c1-12)
          alias="baml-rest-warm/rust-bookworm:${digest}"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "alias=$alias" >> "$GITHUB_OUTPUT"

      # Per-image cross-run caches keyed on the resolved digest: a bump to one
      # tag re-pulls only that image, not the whole set. On a hit the tarball
      # is restored to disk and the pull step skips it.
      - name: Cache node:22-bookworm tarball
        id: cache-node
        uses: actions/cache@v5.0.5
        with:
          path: warm-images/node.tar
          key: warm-image-${{ runner.os }}-node-${{ steps.resolve.outputs.node }}
      - name: Cache debian:bookworm-slim tarball
        id: cache-debian
        uses: actions/cache@v5.0.5
        with:
          path: warm-images/debian.tar
          key: warm-image-${{ runner.os }}-debian-${{ steps.resolve.outputs.debian }}
      - name: Cache golang:1.26.3-alpine tarball
        id: cache-golang
        uses: actions/cache@v5.0.5
        with:
          path: warm-images/golang.tar
          key: warm-image-${{ runner.os }}-golang-${{ steps.resolve.outputs.golang }}
      - name: Cache alpine:3.19 tarball
        id: cache-alpine
        uses: actions/cache@v5.0.5
        with:
          path: warm-images/alpine.tar
          key: warm-image-${{ runner.os }}-alpine-${{ steps.resolve.outputs.alpine }}
      - name: Cache rust alias tarball
        id: cache-rust
        uses: actions/cache@v5.0.5
        with:
          path: warm-images/rust-bookworm.tar
          key: warm-image-${{ runner.os }}-rust-bookworm-${{ steps.rust.outputs.digest }}

      - name: Pull and save base images
        # For each cache miss, pull by immutable digest and tag to the exact
        # tag the Dockerfiles reference, so testcontainers' tag-based `FROM`
        # reuses the loaded image with no registry lookup, then `docker save` a
        # raw tar (Actions compresses the artifact/cache). Cache hits already
        # have the tar on disk from the restore above. Rust is pulled by its
        # pinned digest and tagged ONLY to the local alias.
        env:
          NODE_DIGEST: ${{ steps.resolve.outputs.node }}
          DEBIAN_DIGEST: ${{ steps.resolve.outputs.debian }}
          GOLANG_DIGEST: ${{ steps.resolve.outputs.golang }}
          ALPINE_DIGEST: ${{ steps.resolve.outputs.alpine }}
          RUST_IMAGE: ${{ steps.rust.outputs.image }}
          RUST_ALIAS: ${{ steps.rust.outputs.alias }}
          NODE_HIT: ${{ steps.cache-node.outputs.cache-hit }}
          DEBIAN_HIT: ${{ steps.cache-debian.outputs.cache-hit }}
          GOLANG_HIT: ${{ steps.cache-golang.outputs.cache-hit }}
          ALPINE_HIT: ${{ steps.cache-alpine.outputs.cache-hit }}
          RUST_HIT: ${{ steps.cache-rust.outputs.cache-hit }}
        run: |
          set -euo pipefail
          mkdir -p warm-images

          warm_tag() {
            local tag="$1" digest="$2" tarfile="$3" hit="$4"
            if [ "$hit" = "true" ] && [ -f "warm-images/$tarfile" ]; then
              echo "cache hit: $tag ($tarfile)"
              return
            fi
            local repo="${tag%%:*}"
            echo "pulling ${repo}@${digest} -> ${tag}"
            docker pull "${repo}@${digest}"
            docker tag "${repo}@${digest}" "$tag"
            docker save "$tag" -o "warm-images/$tarfile"
          }

          warm_tag "node:22-bookworm"     "$NODE_DIGEST"   "node.tar"   "$NODE_HIT"
          warm_tag "debian:bookworm-slim" "$DEBIAN_DIGEST" "debian.tar" "$DEBIAN_HIT"
          warm_tag "golang:1.26.3-alpine" "$GOLANG_DIGEST" "golang.tar" "$GOLANG_HIT"
          warm_tag "alpine:3.19"          "$ALPINE_DIGEST" "alpine.tar" "$ALPINE_HIT"

          if [ "$RUST_HIT" = "true" ] && [ -f "warm-images/rust-bookworm.tar" ]; then
            echo "cache hit: $RUST_ALIAS (rust-bookworm.tar)"
          else
            echo "pulling ${RUST_IMAGE} -> ${RUST_ALIAS}"
            docker pull "$RUST_IMAGE"
            docker tag "$RUST_IMAGE" "$RUST_ALIAS"
            docker save "$RUST_ALIAS" -o "warm-images/rust-bookworm.tar"
          fi

          ls -lh warm-images/

      - name: Upload warm images
        uses: actions/upload-artifact@v7.0.1
        with:
          name: warm-images-${{ github.run_id }}
          path: warm-images/*.tar
          if-no-files-found: error
          retention-days: 1

  integration-tests:
    needs: [get-versions, warm-images]
    runs-on: ubuntu-latest
    # Outer backstop only: step timeout-minutes (45m, below) bounds the
    # go-test step from go-test start — the same origin as the watchdog —
    # so the watchdog's 3m margin is invariant of pre-test step duration.
    # This job cap = step (45m) + a realistic pre-test budget (~10m for
    # checkout + Go setup + prebuilt-BAML pull). See #420.
    timeout-minutes: 55
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.get-versions.outputs.matrix) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3

      - name: Download warm base images
        # Base images are pulled once by the warm-images job and handed over as
        # a per-run artifact; this cell only loads them — no Docker Hub login,
        # no pull (#447).
        uses: actions/download-artifact@v8.0.1
        with:
          name: warm-images-${{ github.run_id }}
          path: warm-images

      - name: Load warm base images
        # `docker load` the warmed tarballs before the go-test step so
        # testcontainers' tag-based `FROM` builds reuse them locally instead of
        # pulling from Docker Hub.
        run: |
          set -euo pipefail
          for tar in warm-images/*.tar; do
            echo "loading $tar"
            docker load -i "$tar"
          done
          docker image ls

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run Integration Tests (BAML ${{ matrix.baml-version }}, unary=${{ matrix.unary-server }}, build-request=${{ matrix.use-build-request }}, http-client=${{ matrix.http-client }})
        # Step timeout (45m) and the watchdog (42m) share the SAME origin
        # (go-test start), so the watchdog provably fires 3m before this
        # step is killed regardless of how long the pre-test steps took.
        # `go test -timeout 40m` only guards the in-m.Run window; the
        # watchdog guards setup + teardown (#420).
        timeout-minutes: 45
        env:
          BAML_VERSION: ${{ matrix.baml-version }}
          UNARY_SERVER: ${{ matrix.unary-server }}
          BAML_REST_USE_BUILD_REQUEST: ${{ matrix.use-build-request }}
          BAML_REST_HTTP_CLIENT: ${{ matrix.http-client }}
          # Step timeout (45m) minus 3m margin.
          BAML_REST_SUITE_WATCHDOG: 42m
          # CI-only: skip the testcontainers Ryuk reaper so setup doesn't
          # pull/create it from Docker Hub (the earliest registry touch
          # point, which flaked in #426/#427). Safe here because GH runners
          # are ephemeral and torn down after the job, so leaked containers
          # are cleaned up regardless. Never set this for local runs.
          TESTCONTAINERS_RYUK_DISABLED: true
        # -p 1 ensures tests run sequentially (no parallelism) since integration tests
        # share state (server config, worker pool) that could cause flakiness if parallel.
        # `subprocess` matches the normal server deployment path (server +
        # cmd/worker go-plugin) the default `go build` no longer compiles.
        run: go test -tags=integration,subprocess -v -count=1 -p 1 -timeout 40m ./integration/...

  get-latest-version:
    runs-on: ubuntu-latest
    outputs:
      latest: ${{ steps.read.outputs.latest }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3

      - name: Read latest BAML version
        id: read
        # The in-process job only covers the latest BAML version. Older
        # versions exercise the same recover wrappers and pool shape;
        # the latest entry catches tag rot and single-process deployment
        # regressions without the cost of the full version cross-product.
        #
        # The `.latest // empty` filter handles both missing keys and JSON
        # null; the explicit "null" string check rejects an accidental
        # literal string value. Without the guard, a missing entry would
        # propagate BAML_VERSION=null into Go module resolution and surface
        # as an opaque "module not found" deep in the test run.
        run: |
          latest=$(jq -r '.latest // empty' integration/baml_versions.json)
          if [ -z "$latest" ] || [ "$latest" = "null" ]; then
            echo "::error file=integration/baml_versions.json::missing non-empty .latest BAML version"
            exit 1
          fi
          echo "latest=$latest" >> "$GITHUB_OUTPUT"

  integration-tests-inprocess:
    needs: [get-latest-version, warm-images]
    runs-on: ubuntu-latest
    # Outer backstop only: step timeout-minutes (45m) + pre-test budget
    # (~10m). The step timeout and watchdog share the go-test origin. #420
    timeout-minutes: 55
    strategy:
      fail-fast: false
      matrix:
        # Bounded in-process matrix: latest BAML only, both unary-server
        # values and both use-build-request values. http-client stays at
        # `auto` because the subprocess job already covers the full
        # http-client spread and in-process does not change request dispatch.
        unary-server: [false, true]
        use-build-request: [false, true]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3

      - name: Download warm base images
        # Base images are pulled once by the warm-images job and handed over as
        # a per-run artifact; this cell only loads them — no Docker Hub login,
        # no pull (#447).
        uses: actions/download-artifact@v8.0.1
        with:
          name: warm-images-${{ github.run_id }}
          path: warm-images

      - name: Load warm base images
        # `docker load` the warmed tarballs before the go-test step so
        # testcontainers' tag-based `FROM` builds reuse them locally instead of
        # pulling from Docker Hub.
        run: |
          set -euo pipefail
          for tar in warm-images/*.tar; do
            echo "loading $tar"
            docker load -i "$tar"
          done
          docker image ls

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run Integration Tests (in-process, BAML ${{ needs.get-latest-version.outputs.latest }}, unary=${{ matrix.unary-server }}, build-request=${{ matrix.use-build-request }})
        # Step timeout (45m) and watchdog (42m) share the go-test origin;
        # watchdog fires 3m before the step is killed. #420
        timeout-minutes: 45
        env:
          BAML_VERSION: ${{ needs.get-latest-version.outputs.latest }}
          UNARY_SERVER: ${{ matrix.unary-server }}
          BAML_REST_USE_BUILD_REQUEST: ${{ matrix.use-build-request }}
          BAML_REST_HTTP_CLIENT: auto
          # Step timeout (45m) minus 3m margin.
          BAML_REST_SUITE_WATCHDOG: 42m
          # CI-only: skip the testcontainers Ryuk reaper so setup doesn't
          # pull/create it from Docker Hub (the earliest registry touch
          # point, which flaked in #426/#427). Safe here because GH runners
          # are ephemeral and torn down after the job, so leaked containers
          # are cleaned up regardless. Never set this for local runs.
          TESTCONTAINERS_RYUK_DISABLED: true
        # No `subprocess` tag — the default no-tag build compiles the
        # direct in-process worker path.
        run: go test -tags=integration -v -count=1 -p 1 -timeout 40m ./integration/...

  build-baml-cffi:
    needs: warm-images
    runs-on: ubuntu-latest
    # Build the BAML cffi artifact (libbaml_cffi.so + baml-cli) exactly once,
    # OUTSIDE the integration-tests-baml-source watchdog window, and hand it to
    # the 8 matrix cells so they skip the ~18m cargo build entirely. On a warm
    # cache (the common case — .source is a pinned SHA) this restores in ~1-2m;
    # on a cold cache (a Renovate .source bump) it runs the full release build
    # here, where a generous cap absorbs it and the matrix cells never see the
    # ~18m under their 67m watchdog. See #433.
    timeout-minutes: 35
    permissions:
      contents: read
    outputs:
      commit: ${{ steps.baml-source.outputs.commit }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3

      - name: Download warm base images
        # The cffi build below `docker run`s the rust base. The warm-images job
        # pulled the pinned digest and saved it under a local alias; this cell
        # loads that tarball and runs the alias — no Docker Hub login, no pull
        # (#447).
        uses: actions/download-artifact@v8.0.1
        with:
          name: warm-images-${{ github.run_id }}
          path: warm-images

      - name: Load warm base images
        # `docker load` the warmed tarballs before the cffi `docker run` so the
        # rust alias resolves locally instead of pulling from Docker Hub.
        run: |
          set -euo pipefail
          for tar in warm-images/*.tar; do
            echo "loading $tar"
            docker load -i "$tar"
          done
          docker image ls

      - name: Read BAML source commit
        id: baml-source
        # Guard against a missing/null .source: jq -r writes the literal
        # "null" on a missing key, which would propagate as a bogus git ref
        # and cache input. Fail fast instead. This is the single source of
        # the commit — the consumer job reads it via needs.*.outputs.commit.
        run: |
          commit=$(jq -r '.source // empty' integration/baml_versions.json)
          if [ -z "$commit" ] || [ "$commit" = "null" ]; then
            echo "::error file=integration/baml_versions.json::missing non-empty .source BAML source commit"
            exit 1
          fi
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

      - name: Checkout BAML Source
        uses: actions/checkout@v6.0.3
        with:
          repository: BoundaryML/baml
          ref: ${{ steps.baml-source.outputs.commit }}
          path: baml-source

      - name: Detect protoc-gen-go version
        id: protoc
        # Mirror cmd/build/main.go detectProtocGenGoVersion: read the
        # `// protoc-gen-go vX.Y.Z` marker from a generated .pb.go file so the
        # prebuild's protobuf toolchain matches what the in-Docker cffi-builder
        # stage would have used (currently v1.34.1).
        run: |
          ver=$(grep -rhoE 'protoc-gen-go v[0-9]+\.[0-9]+\.[0-9]+' \
            baml-source/engine/language_client_go/pkg/cffi/*.pb.go \
            | head -n1 | sed 's/protoc-gen-go v/v/')
          if [ -z "$ver" ]; then
            echo "::error::could not detect protoc-gen-go version from baml-source"
            exit 1
          fi
          echo "Detected protoc-gen-go $ver"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Resolve pinned rust image
        id: rust-image
        # Single-source the rust base from the Dockerfile FROM pin so the cache
        # key and the build's docker run both derive from the same digest. A
        # future digest bump in cmd/build/Dockerfile.tmpl then invalidates this
        # cache automatically, instead of risking a cache-hit that serves a .so
        # built under the old toolchain.
        run: |
          matches=$(grep -cE '^FROM rust:bookworm@sha256:[0-9a-f]+' cmd/build/Dockerfile.tmpl)
          if [ "$matches" -ne 1 ]; then
            echo "::error file=cmd/build/Dockerfile.tmpl::expected exactly one pinned 'FROM rust:bookworm@sha256:' line, found $matches"
            exit 1
          fi
          image=$(grep -oE 'rust:bookworm@sha256:[0-9a-f]+' cmd/build/Dockerfile.tmpl | head -n1)
          digest=$(printf '%s' "$image" | sed -E 's/.*@sha256://' | cut -c1-12)
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Restore prebuilt cffi cache
        id: cache
        uses: actions/cache@v5.0.5
        with:
          path: prebuilt-cffi
          # Final-artifact cache. The key fully pins the artifact: the BAML
          # source commit fixes the source AND Cargo.lock; the rust:bookworm
          # digest fragment (derived from the Dockerfile FROM pin) fixes the
          # toolchain so a base bump invalidates the cache rather than serving a
          # stale .so. Cargo.lock hash is a cheap belt-and-braces guard against
          # a dirty tree.
          key: baml-cffi-${{ runner.os }}-rust-bookworm-${{ steps.rust-image.outputs.digest }}-${{ steps.baml-source.outputs.commit }}-${{ hashFiles('baml-source/engine/Cargo.lock') }}
          # Partial restores warm the slot for inspection only — a different
          # commit's .so is the WRONG artifact, so the cargo build below gates
          # on an EXACT-key hit (cache-hit == 'true'), not these fallbacks.
          restore-keys: |
            baml-cffi-${{ runner.os }}-rust-bookworm-${{ steps.rust-image.outputs.digest }}-${{ steps.baml-source.outputs.commit }}-
            baml-cffi-${{ runner.os }}-rust-bookworm-${{ steps.rust-image.outputs.digest }}-

      - name: Build cffi artifact in rust:bookworm
        # Gate on an EXACT-key cache hit only (see restore-keys note above).
        # glibc parity is load-bearing: the .so MUST be compiled inside
        # rust:bookworm (Debian, glibc 2.36), NOT on the bare ubuntu-latest
        # runner (glibc 2.39), or it fails to load in the bookworm-slim runtime
        # with GLIBC_2.3x-not-found. The run uses the warm-images rust alias,
        # which is the Dockerfile FROM pin pulled-and-tagged by the warm job
        # (steps.rust-image above resolves the same digest for the cache key),
        # so this reproduces the in-Docker cffi-builder environment exactly.
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          PROTOC_GEN_GO_VERSION: ${{ steps.protoc.outputs.version }}
        run: |
          mkdir -p prebuilt-cffi
          docker run --rm \
            -e GO_VERSION="${GO_VERSION}" \
            -e PROTOC_GEN_GO_VERSION \
            -v "${{ github.workspace }}/baml-source:/baml-source" \
            -v "${{ github.workspace }}/prebuilt-cffi:/out" \
            "${{ needs.warm-images.outputs.rust-alias }}" \
            bash -euo pipefail -c '
              apt-get update >/dev/null && apt-get install -y wget >/dev/null
              arch=$(dpkg --print-architecture)
              wget -q "https://go.dev/dl/go${GO_VERSION}.linux-${arch}.tar.gz"
              tar -C /usr/local -xzf "go${GO_VERSION}.linux-${arch}.tar.gz"
              export GOPATH=/go
              export PATH="/usr/local/go/bin:/go/bin:${PATH}"
              go install google.golang.org/protobuf/cmd/protoc-gen-go@${PROTOC_GEN_GO_VERSION}
              cd /baml-source/engine
              cargo build --release -p baml-cli -p baml_cffi
              cp target/release/libbaml_cffi.so /out/libbaml_cffi.so
              cp target/release/baml-cli /out/baml-cli
            '

      - name: Upload prebuilt cffi artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          # Name keyed on the source commit so overlapping retention windows
          # across runs can never hand a cell the wrong commit's artifact.
          name: baml-cffi-${{ steps.baml-source.outputs.commit }}
          path: |
            prebuilt-cffi/libbaml_cffi.so
            prebuilt-cffi/baml-cli
          retention-days: 1
          if-no-files-found: error

  integration-tests-baml-source:
    needs: [build-baml-cffi, warm-images]
    runs-on: ubuntu-latest
    # The baml-source matrix builds BAML from source, which dominates the
    # per-cell wall time and pushes consistent runs into the 38-45m
    # window. This is the cell where #420 manifests. The go-test step is
    # bounded at 70m (below) from go-test start — the same origin as the
    # 67m watchdog — so the watchdog's 3m margin holds regardless of
    # pre-test step duration. This JOB cap is the looser outer backstop:
    # step (70m) + pre-test overhead (~5m for checkout, BAML source
    # checkout, and Go setup) stays under 75m. See #420, #428.
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        unary-server: [false, true]
        use-build-request: [false, true]
        http-client: [auto, nethttp, fasthttp]
        exclude:
          # See the matrix comment on the versioned job — http-client has
          # no effect on the legacy path, so the auto × !buildrequest and
          # fasthttp × !buildrequest cells would just duplicate the
          # nethttp × !buildrequest cell.
          - use-build-request: false
            http-client: auto
          - use-build-request: false
            http-client: fasthttp

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3

      - name: Download warm base images
        # Base images are pulled once by the warm-images job and handed over as
        # a per-run artifact; this cell only loads them — no Docker Hub login,
        # no pull (#447).
        uses: actions/download-artifact@v8.0.1
        with:
          name: warm-images-${{ github.run_id }}
          path: warm-images

      - name: Load warm base images
        # `docker load` the warmed tarballs before the go-test step so
        # testcontainers' tag-based `FROM` builds reuse them locally instead of
        # pulling from Docker Hub.
        run: |
          set -euo pipefail
          for tar in warm-images/*.tar; do
            echo "loading $tar"
            docker load -i "$tar"
          done
          docker image ls

      - name: Checkout BAML Source
        uses: actions/checkout@v6.0.3
        with:
          repository: BoundaryML/baml
          ref: ${{ needs.build-baml-cffi.outputs.commit }}
          path: baml-source

      - name: Download prebuilt cffi artifact
        # Built once by build-baml-cffi (same source commit -> same artifact
        # name). Injecting it lets the Docker build COPY the .so + baml-cli and
        # skip the cffi-builder cargo stage, removing ~18m from each cell's
        # pre-go-test wall time. See #433.
        uses: actions/download-artifact@v8.0.1
        with:
          name: baml-cffi-${{ needs.build-baml-cffi.outputs.commit }}
          path: prebuilt-cffi

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run Integration Tests (BAML Source, unary=${{ matrix.unary-server }}, build-request=${{ matrix.use-build-request }}, http-client=${{ matrix.http-client }})
        # Step timeout (70m) and the watchdog (67m) share the SAME origin
        # (go-test start), so the watchdog fires 3m before the step is
        # killed regardless of pre-test step duration — the gap the bare
        # job cap could not guarantee. `go test -timeout 65m` only guards
        # the in-m.Run window; the watchdog guards setup + teardown (#420).
        timeout-minutes: 70
        env:
          BAML_SOURCE: ${{ github.workspace }}/baml-source
          # Directory of the prebuilt cffi artifact downloaded above. Its
          # presence flips the Docker build to inject the prebuilt .so + baml-cli
          # instead of running the in-image cargo build (testutil/container.go).
          BAML_PREBUILT_CFFI_DIR: ${{ github.workspace }}/prebuilt-cffi
          UNARY_SERVER: ${{ matrix.unary-server }}
          BAML_REST_USE_BUILD_REQUEST: ${{ matrix.use-build-request }}
          BAML_REST_HTTP_CLIENT: ${{ matrix.http-client }}
          # Step timeout (70m) minus 3m margin. Larger than the 45m-cap
          # jobs because a healthy baml-source m.Run runs 38-45m and must
          # not false-trip; still leaves headroom over the 65m go-test
          # timeout so an in-m.Run hang gets Go's own dump first. Widened
          # from 57m in #428: the ~20m Rust build crowds the suite and the
          # old 57m watchdog false-tripped slow cells (#426 saw 119 PASS /
          # 0 FAIL die at 57m) — used the ~15m headroom under the 75m cap.
          BAML_REST_SUITE_WATCHDOG: 67m
          # CI-only: skip the testcontainers Ryuk reaper so setup doesn't
          # pull/create it from Docker Hub (the earliest registry touch
          # point, which flaked in #426/#427). Safe here because GH runners
          # are ephemeral and torn down after the job, so leaked containers
          # are cleaned up regardless. Never set this for local runs.
          TESTCONTAINERS_RYUK_DISABLED: true
        # `subprocess` matches the normal server deployment path used
        # by the versioned integration job above. The 65m Go timeout
        # sits below the 70m step budget so a near-timeout case still has
        # room to dump its envelope before the step is killed.
        run: go test -tags=integration,subprocess -v -count=1 -p 1 -timeout 65m ./integration/...
