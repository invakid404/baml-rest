name: Unit Tests

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.2"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    # -race -count=100 across every module has grown past the 10-minute
    # cap as suites expanded (bamlutils/buildrequest ~4 min,
    # pool ~4 min on their own). 25 leaves headroom for further growth
    # without masking a real stuck-test regression.
    timeout-minutes: 25

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run Unit Tests (all modules)
        run: |
          # Adapter modules run their own tests inside cmd/build/build.sh
          # during the integration test workflow, against the BAML version
          # they're pinned to.
          find . -name go.mod -not -path '*/adapters/adapter_*' -exec dirname {} \; | while read dir; do
            echo "=== Testing $dir ==="
            (cd "$dir" && go test -race -count=100 ./...)
          done

      - name: Run cmd/serve unaryserver-tagged tests
        run: |
          # cmd/serve has chi-handler tests gated behind //go:build unaryserver
          # (cmd/serve/unary_test.go); cmd/serve/unary.go is also tagged so
          # cmd/serve/unary_stub.go can supply the default-build stub. The
          # default `go test ./...` above silently skips the tagged suite,
          # leaving the unary handler request path uncovered in CI. Run
          # them as a dedicated step at the same race + repeat budget as
          # the default suite.
          go test -race -count=100 -tags=unaryserver ./cmd/serve/...
