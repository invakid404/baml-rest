name: Unit Tests

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.3"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    # -race -count=100 across every module has grown past the 10-minute
    # cap as suites expanded (bamlutils/buildrequest ~4 min,
    # pool ~4 min on their own). 25 leaves headroom for further growth
    # without masking a real stuck-test regression.
    timeout-minutes: 35

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24.16.0"

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Run Unit Tests (all modules)
        run: |
          # Adapter modules run their own tests inside cmd/build/build.sh
          # during the integration test workflow, against the BAML version
          # they're pinned to.
          #
          # adapters/common is also outside go.work (it directly requires
          # github.com/boundaryml/baml v0.204.0; keeping it in the workspace
          # would make go work sync lift its BAML pin to the workspace MVS
          # max — see go.work for the full rationale). With go.work active,
          # `go test ./...` from inside common resolves through the
          # workspace's main module (root), which doesn't contain
          # adapters/common packages, and fails setup. GOWORK=off forces
          # common's own go.mod to be the build list — same envelope
          # scripts/sync.sh uses for the per-adapter tidies.
          #
          # dynclient/baml-patched is skipped in this workspace-mode
          # loop: it's vendored upstream BAML source, isn't a go.work
          # member (see go.work), and would need GOWORK=off to test
          # from inside. Its standalone-mode coverage is provided by
          # the standalone-modules matrix job below, which runs
          # `GOWORK=off go test ./...` from inside it; the patched
          # module's behavior is additionally exercised transitively
          # through ./dynclient in this workspace-mode loop.
          find . -name go.mod -not -path '*/adapters/adapter_*' -not -path '*/dynclient/baml-patched/*' -exec dirname {} \; | while read dir; do
            echo "=== Testing $dir ==="
            if [ "$dir" = "./adapters/common" ]; then
              (cd "$dir" && GOWORK=off go test -race -count=100 -timeout 20m ./...)
            else
              (cd "$dir" && go test -race -count=100 -timeout 20m ./...)
            fi
          done

      - name: Subprocess build + test sanity
        # The default loop above runs everything under the no-tag build
        # (which is now the direct in-process worker path). The
        # `subprocess` tag flips a few key call sites and removes the
        # recover wrappers in pool + worker; this step
        # exercises that the tag still compiles cleanly and the
        # subprocess-only tests pass. Kept narrow on purpose — running
        # -race -count=100 across every module under subprocess would
        # roughly double CI wallclock for marginal additional coverage.
        run: |
          go build ./...
          # Route the subprocess-tag sanity build artifact to $RUNNER_TEMP so
          # it doesn't leave an untracked `serve` binary in the repo root
          # that would trip the `cmd/regenerate-dynclient fresh-tree gate`
          # below.
          go build -tags=subprocess -o "$RUNNER_TEMP/serve-build-sanity" ./cmd/serve
          go test -tags=subprocess -count=1 ./pool ./worker ./cmd/serve
          go test -race -tags=subprocess -count=1 ./pool ./worker

      - name: Verify framework adapter codegen-emit
        # Two independent checks per adapter: deterministic emission
        # (run the emitter twice, byte-compare) and behavioural test
        # parity (copy the per-adapter module to a tempdir, write the
        # emitted adapter.go into it, run GOWORK=off go test ./adapter/).
        # The verifier writes only to tempdirs; the source-tree
        # adapters/adapter_v*/adapter/ siblings (test harnesses,
        # dynamic_value.go) are never touched.
        run: go run ./cmd/verify-framework-adapter

      - name: scripts/sync.sh fresh-tree gate
        # Fresh-tree gate for the sync.sh / per-adapter BAML-pin contract.
        # Running sync.sh on a clean checkout must leave every pinned
        # module's go.mod / go.sum byte-identical: if `go work sync` ever
        # lifts a pin (the regression fixed by removing adapters/common
        # from go.work), this step fails with a diff. The verify step
        # double-asserts the pin matrix via cmd/verify-adapter-pins so a
        # diff-free-but-wrong state can't slip through either.
        run: |
          git status --porcelain
          ./scripts/sync.sh
          git diff --exit-code -- \
            adapters/common/go.mod adapters/common/go.sum \
            'adapters/adapter_v0_*/go.mod' 'adapters/adapter_v0_*/go.sum'

      - name: cmd/regenerate-dynclient fresh-tree gate
        # Fresh-tree gate for committed dynclient regeneration artifacts.
        # The regen tool owns dynclient/internal/generated/**,
        # dynclient/baml-patched/**, root embed.go, and related provenance.
        # Running it on a clean checkout must leave the tree byte-identical.
        # Pairs with PR #299 normalization — without this gate, regen drift
        # accumulates silently across PRs (the latent-drift class of bug
        # that produced #299).
        run: |
          # go.work.sum may be dirtied by earlier workspace-mode Go commands
          # (the per-module test loop above appends additive module-content
          # checksums). Restore the committed version before checking
          # dynclient-owned drift. This only discards uncommitted go.work.sum
          # mutations — `git checkout -- go.work.sum` restores it to HEAD,
          # which already includes any committed PR change, and the full-tree
          # status check immediately below still fails on every other dirty
          # file (#442).
          git checkout -- go.work.sum 2>/dev/null || true

          if [ -n "$(git status --porcelain)" ]; then
            echo "ERROR: tree is dirty before cmd/regenerate-dynclient."
            git status --short
            git diff
            exit 1
          fi

          go run ./cmd/regenerate-dynclient

          # go.work.sum is an additive checksum database, not a lockfile.
          # The regen's transitive `go mod tidy` may append entries that
          # weren't present at commit time if the Go module proxy has
          # published new sums since. Restore the committed version so
          # additive-only sum drift doesn't trip the idempotency gate.
          git checkout -- go.work.sum 2>/dev/null || true

          if [ -n "$(git status --porcelain)" ]; then
            echo "ERROR: cmd/regenerate-dynclient is not idempotent on this commit."
            git status --short
            echo
            echo "Tracked diff:"
            git diff
            echo
            echo "Untracked files:"
            git ls-files --others --exclude-standard
            exit 1
          fi

  # Per-module GOWORK=off sanity matrix for the modules we publish
  # release tags for. The job above runs everything under the
  # workspace, which masks per-module go.sum drift: a missing
  # `pkg@ver/go.mod` hash in worker/go.sum is silently covered by
  # go.work.sum during the workspace build, so the failure only
  # surfaces during release-prep (or for external consumers who
  # always resolve via GOWORK=off semantics, since they don't share
  # our go.work). #327 was the most recent miss of this shape: a
  # stale dynclient/go.sum that only got caught by a maintainer's
  # manual check during the 0.0.47 release-prep.
  #
  # Matrix mirrors release-lib.sh's `release_required_modules`. Keep
  # the two in sync if a future release adds or removes a published
  # module. adapters/adapter_v* and the root module are excluded for
  # the same reasons release-lib.sh excludes them (per-adapter BAML
  # pins, workspace-only respectively).
  standalone-modules:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        module:
          - adapters/common
          - bamlutils
          - dynclient
          - dynclient/baml-patched
          - introspected
          - worker
          - workerplugin

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: GOWORK=off go test ./...
        run: |
          cd "${{ matrix.module }}"
          GOWORK=off go test ./... -count=1
