name: Unit Tests

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.2"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    # -race -count=100 across every module has grown past the 10-minute
    # cap as suites expanded (bamlutils/buildrequest ~4 min,
    # pool ~4 min on their own). 25 leaves headroom for further growth
    # without masking a real stuck-test regression.
    timeout-minutes: 25

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run Unit Tests (all modules)
        run: |
          # Adapter modules run their own tests inside cmd/build/build.sh
          # during the integration test workflow, against the BAML version
          # they're pinned to.
          find . -name go.mod -not -path '*/adapters/adapter_*' -exec dirname {} \; | while read dir; do
            echo "=== Testing $dir ==="
            (cd "$dir" && go test -race -count=100 ./...)
          done

      - name: Verify framework adapter codegen-emit
        # PR 4a of #199 item 1 — verifier-only phase. Three independent
        # checks per adapter (structural equivalence vs hand-written file,
        # deterministic emission, behavioural test parity against the
        # codegen-emitted candidate). The verifier writes only to tempdirs;
        # the hand-written adapters/adapter_v*/adapter/adapter.go files are
        # never touched. PR 4b removes the hand-written files once this
        # check has been green for ≥N consecutive main-branch runs covering
        # at least one PR touching adapters/ or adapters/common/codegen/.
        run: go run ./cmd/verify-framework-adapter
