name: nanollm Send (gated)

# De-BAML Slice 2a: gated, TEST-ONLY functional-send suite for nanollm. It
# drives a baml-rest-native OpenAI chat body (internal/nativebody.BuildOpenAIChat)
# through nanollm's REAL Do/DoStream executor — across the embedded CGO/Rust
# translation core — to a provider-native HTTP endpoint over LOOPBACK and back to
# an OpenAI-shaped caller result:
#
#   nativebody body -> nanollm Go API -> CGO/Rust core -> provider-native HTTP
#     -> go-mocklm openai|anthropic route -> native response/SSE
#     -> nanollm translation -> OpenAI caller result
#
# The provider mock is the PUBLIC github.com/viktordanov/go-mocklm @ v0.4.0. It
# is a `package main` (not an embeddable library), so it is pinned as a Go TOOL
# in the isolated test module and BUILT ONCE here, then launched by the tests as
# a subprocess bound to 127.0.0.1. Every credential is a literal fake, every
# BaseURL is a literal loopback URL, and the tests' http.Client rejects any
# non-loopback dial — there are NO real provider keys and NO public egress.
#
# This is a SIBLING to nanollm-prepare.yml, deliberately NOT folded into it: the
# send suite has different dependencies and failure modes (subprocess, real
# loopback HTTP, SSE) and is ADVISORY initially, so keeping it separate preserves
# the Prepare lane's name/policy and avoids rerunning its BAML CFFI provisioning.
# Unlike Prepare, this suite pulls in NO BAML runtime: the request body comes
# from baml-rest's own native builder, so the tests are `nanollm_integration`
# only — there is NO `integration` tag, NO BAML CFFI pre-provision/cache, and NO
# provider secrets or secret-conditioned skips. Slice 1 already covers the clean
# public install, the ABI guard, and off-matrix behavior; none are duplicated
# here.
#
# The gated tests + their nanollm and go-mocklm dependencies live entirely in the
# SEPARATE, out-of-workspace module (nativeserve — the de-BAML #624 serve core that
# now hosts the relocated execute/admission/parity/canary suites), so the
# root/default build never resolves, fetches, or links either module: a cold
# `go build ./...` / `go test ./...` (no tags) needs no nanollm, no go-mocklm, no
# cgo, and no C toolchain. The preflight below asserts that isolation.
#
# De-secreted + fork-safe: no secret is used, both modules are proxy/sumdb-
# resolvable, and the committed Linux/AMD64 nanollm archive makes fork-PR runs
# equivalent to internal-PR runs. It runs on every push to master and every
# pull_request. Advisory in Slice 2 — do NOT add it to branch protection yet.

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: nanollm-send-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: read-only checkout. Both public modules (and the committed
# nanollm archive) are fetched from the Go proxy/sumdb — no token, no cross-repo
# credential.
permissions:
  contents: read

env:
  GO_VERSION: "1.26.5"
  # The PUBLIC nanollm-ffi Go module version; must match the test module's
  # go.mod require. It embeds + links its prebuilt Rust FFI archive per-platform,
  # so there is no separate release-bundle tag to pin.
  NANOLLM_GO_VERSION: "v0.3.2"
  # The PUBLIC go-mocklm version pinned as a Go tool in the isolated module.
  GO_MOCKLM_VERSION: "v0.4.0"

jobs:
  nanollm-send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # cgo is a hard prerequisite of the public nanollm-ffi package (it links a
      # prebuilt Rust static archive). This is the default cgo setting, NOT a
      # custom artifact/link configuration; there are no CGO_CFLAGS/CGO_LDFLAGS.
      CGO_ENABLED: "1"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7.0.0
        with:
          # Fork-safe, de-secreted lane: it runs PR-supplied Go build/test but
          # performs NO authenticated Git operation — the public module fetches
          # are via GOPROXY and the sibling `replace` targets are local in-repo
          # paths. Don't leave GITHUB_TOKEN in .git/config.
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Assert pins (nanollm-ffi @ v0.3.2, go-mocklm @ v0.4.0) + zero-root isolation
        run: |
          set -euo pipefail
          gomod=nativeserve/go.mod
          # EXACT-version pin assertion (not a substring): the version token must
          # be followed by whitespace or end-of-line, so a prerelease cannot
          # satisfy the pin. Dots are escaped so they match literally.
          exact_pin() { # <module_path> <version>
            local esc; esc="$(printf '%s' "$2" | sed 's/[.]/\\./g')"
            grep -qE "(^|[[:space:]])$1[[:space:]]+${esc}([[:space:]]|\$)" "$gomod"
          }
          # The PUBLIC nanollm-ffi module is required by the isolated nativeserve
          # module, at exactly v0.3.2.
          exact_pin "github.com/viktordanov/nanollm-ffi/go" "${NANOLLM_GO_VERSION}" \
            || { echo "test module does not pin nanollm-ffi/go at exactly ${NANOLLM_GO_VERSION}"; exit 1; }
          # go-mocklm is pinned at exactly v0.4.0 AND declared as a Go tool (the
          # tool directive is what `go install tool` below builds).
          exact_pin "github.com/viktordanov/go-mocklm" "${GO_MOCKLM_VERSION}" \
            || { echo "test module does not pin go-mocklm at exactly ${GO_MOCKLM_VERSION}"; exit 1; }
          grep -qE "^tool[[:space:]]+github.com/viktordanov/go-mocklm\$" "$gomod" \
            || { echo "test module does not declare go-mocklm as a Go tool"; exit 1; }
          # Default-build isolation: the ROOT dependency/workspace files must
          # reference NEITHER module (the nanollm prefix matches nanollm-ffi too).
          for f in go.mod go.sum go.work go.work.sum; do
            if grep -q "github.com/viktordanov/nanollm" "$f"; then
              echo "root $f must NOT reference nanollm (default-build isolation)"; exit 1
            fi
            if grep -q "github.com/viktordanov/go-mocklm" "$f"; then
              echo "root $f must NOT reference go-mocklm (default-build isolation)"; exit 1
            fi
          done
          # Neither nanollm-linked module may be a go.work member — both stay out of
          # the workspace so the cgo nanollm archive never enters the default graph.
          if grep -qE "(^|[[:space:]./])(nativeserve|internal/nativebody/nanollmprepare)([[:space:]/]|\$)" go.work; then
            echo "nativeserve and internal/nativebody/nanollmprepare must NOT be go.work members"; exit 1
          fi

      - name: Resolve isolated-module dependencies (pinned)
        run: |
          set -euo pipefail
          # Ordinary dependency resolution for the checked-in isolated module: its
          # nanollm-ffi + go-mocklm requires are already pinned in go.mod/go.sum,
          # so download them with GOWORK=off (the module's own go.mod is
          # authoritative). Do NOT `go get` here — that would mutate the pins.
          cd nativeserve
          GOWORK=off go mod download

      - name: Build the pinned go-mocklm tool
        run: |
          set -euo pipefail
          # Build the module's declared tool(s) into $RUNNER_TEMP/bin. go-mocklm
          # is the only tool, so this produces $RUNNER_TEMP/bin/go-mocklm, which
          # the tests launch as a subprocess via MOCKLM_BINARY (authoritative in
          # CI — the harness only falls back to building on demand when unset).
          cd nativeserve
          GOBIN="$RUNNER_TEMP/bin" GOWORK=off go install tool
          echo "MOCKLM_BINARY=$RUNNER_TEMP/bin/go-mocklm" >> "$GITHUB_ENV"

      - name: Run gated functional-send suite (loopback, no secrets)
        env:
          # Force go-mocklm to validate every emitted body/SSE payload against its
          # pinned nanollm OpenAPI closure before writing it — a native-wire oracle.
          MOCKLM_VALIDATE_RESPONSES: "1"
        run: |
          # Singly gated by `nanollm_integration` (no `integration` tag: nativeserve
          # links NO BAML CFFI — it is the de-BAML native serve core). The public
          # nanollm-ffi module embeds + links its prebuilt CGO archive automatically
          # — no nanollm_prebuilt tag, no CGO_CFLAGS/CGO_LDFLAGS. Run inside the
          # SEPARATE nativeserve module with GOWORK=off so its go.mod (the only one
          # requiring nanollm + go-mocklm) is the build list — the workspace/root
          # never sees either. `./...` covers the whole relocated serve core: the
          # functional-send suite (./execute), admission, plan/response compare
          # (./parity), the serve disposition mapper (./canary), the compare helper
          # (./testutil), and the public constructor smoke test (nativeserve.New).
          cd nativeserve
          GOWORK=off go test -tags "nanollm_integration" \
            -count=1 -v ./...
