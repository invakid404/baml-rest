name: Build and Publish

on:
  push:
    branches: [master]
  release:
    types: [published]

concurrency:
  group: build-and-publish
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.26.3"

jobs:
  # Build Linux binaries on release
  build-linux-binaries:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: baml-rest-linux-amd64
          - goos: linux
            goarch: arm64
            output: baml-rest-linux-arm64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -o ${{ matrix.output }} ./cmd/build/main.go

      - name: Upload Binary as Release Asset
        uses: actions/upload-release-asset@v1.0.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./${{ matrix.output }}
          asset_name: ${{ matrix.output }}
          asset_content_type: application/octet-stream

  # Build macOS binaries on release
  build-macos-binaries:
    if: github.event_name == 'release'
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            output: baml-rest-darwin-arm64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -o ${{ matrix.output }} ./cmd/build/main.go

      - name: Sign Binary
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_IDENTITY: ${{ secrets.MACOS_IDENTITY }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode certificate and import to keychain
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import certificate.p12 -k "$KEYCHAIN_PATH" -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add keychain to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)

          # Sign the binary
          /usr/bin/codesign --force --sign "$MACOS_IDENTITY" --options runtime --timestamp ${{ matrix.output }}

          # Verify signature
          /usr/bin/codesign --verify --verbose ${{ matrix.output }}

          # Clean up
          security delete-keychain "$KEYCHAIN_PATH"
          rm certificate.p12

      - name: Notarize Binary
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Create a zip file (required for notarization)
          ditto -c -k --keepParent ${{ matrix.output }} ${{ matrix.output }}.zip

          # Submit for notarization
          xcrun notarytool submit ${{ matrix.output }}.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Clean up zip
        run: rm ${{ matrix.output }}.zip

      - name: Upload Binary as Release Asset
        uses: actions/upload-release-asset@v1.0.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./${{ matrix.output }}
          asset_name: ${{ matrix.output }}
          asset_content_type: application/octet-stream

  # Build Docker images (multi-arch)
  build-docker:
    runs-on: ubuntu-latest
    env:
      # Job-level so the Docker Hub login step's own `if:` can read it — a
      # step-level env is not reliably in scope for that step's own `if:`,
      # which would skip the login and leave the base-image pull unauthenticated.
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3

      - name: Log in to Docker Hub
        # Dockerfile.builder's `FROM node:22-bookworm` resolves to Docker Hub,
        # so the build-push-action below does an anonymous base-image pull that
        # hits the same shared-runner-IP rate limit as the integration jobs
        # (#447). This is separate from — and in addition to — the ghcr.io login
        # below (ghcr.io is the push target, not the base-image source).
        #
        # secrets.* can't be referenced directly in a step `if:`, so gate on
        # the job-level DOCKERHUB_USERNAME env (set above) — the step skips
        # cleanly on forks / when the secret is absent instead of running
        # login-action with empty credentials.
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to the Container registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ghcr.io/invakid404/baml-rest-builder

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ./Dockerfile.builder
          platforms: linux/${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/invakid404/baml-rest-builder,push-by-digest=true,name-canonical=true,push=true
          # setup-buildx-action's default docker-container driver keeps a build
          # cache separate from the daemon image store, so a daemon `docker
          # load` would not warm it — wire up the GitHub Actions BuildKit cache
          # instead. After one warm run, base layers (FROM node:22-bookworm)
          # and build steps restore from the gha cache instead of pulling from
          # Docker Hub (#447); the Docker Hub login above still covers cold
          # misses. Scoped per arch so the amd64 and arm64 matrix cells don't
          # clobber each other's cache.
          cache-from: type=gha,scope=baml-rest-builder-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=baml-rest-builder-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge Docker manifests
  merge-docker:
    runs-on: ubuntu-latest
    needs:
      - build-docker
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ghcr.io/invakid404/baml-rest-builder
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Log in to the Container registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/invakid404/baml-rest-builder@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/invakid404/baml-rest-builder:${{ steps.meta.outputs.version }}
