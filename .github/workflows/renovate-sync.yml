name: Renovate Go Module Sync

on:
  push:
    branches:
      - "renovate/**"

concurrency:
  group: renovate-sync-${{ github.ref }}
  # A github-actions[bot] sync commit pushed by this workflow must not
  # cancel the dep-bump run that just produced it (that older run is
  # finishing post-job cleanup). Real Renovate dep-bump/rebase pushes
  # (authored by renovate[bot]) still cancel older in-flight sync runs.
  cancel-in-progress: ${{ github.event.head_commit.author.name != 'github-actions[bot]' }}

env:
  GO_VERSION: "1.26.3"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    if: github.event.head_commit.author.name != 'github-actions[bot]'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.ref_name }}
          # PAT used both for checkout and the sync commit's push.
          # actions/checkout writes a URL-scoped HTTP Basic
          # extraheader (`x-access-token:<PAT>`) to the runner's
          # git config and removes it during post-job cleanup.
          # PAT-authored pushes retrigger normal PR-event CI;
          # GITHUB_TOKEN-authored pushes are suppressed by GitHub
          # to prevent workflow recursion.
          token: ${{ secrets.RENOVATE_SYNC_TOKEN }}

      - name: Verify PAT push auth
        # Preflight: exercise git-receive-pack auth before doing
        # any sync work. If the PAT lacks Contents:write or the
        # auth wiring is otherwise broken, we want to fail here
        # with a clear error, not after producing a sync commit
        # that has nowhere to go.
        env:
          GIT_TERMINAL_PROMPT: "0"
        run: git push --dry-run origin "HEAD:${GITHUB_REF_NAME}"

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.sum
            go.work.sum
            **/go.sum

      - name: Run scripts/sync.sh
        run: ./scripts/sync.sh

      - name: Populate workspace module checksums
        # scripts/sync.sh reconciles go.mod/go.sum and some go.work.sum
        # entries, but `go work sync` + `GOWORK=off go mod tidy` do not
        # force a download/verify of every module zip the workspace tests
        # later load. That left module-content `h1:` lines (e.g.
        # golang.org/x/crypto vX.Y.Z) missing from go.work.sum after a
        # dep-bump sync, so the first workspace-mode package load in
        # unit-tests appended them and dirtied the tree before
        # cmd/regenerate-dynclient (#442 / unblocks #438).
        #
        # Mirror the unit-tests.yml workspace-mode module traversal but use
        # `go list -deps -test` instead of running tests: it forces module
        # zip verification so Go appends the required workspace checksums
        # before the allowlist/commit step below.
        run: |
          find . -name go.mod -not -path '*/adapters/adapter_*' -not -path '*/dynclient/baml-patched/*' -exec dirname {} \; | while read -r dir; do
            if [ "$dir" = "./adapters/common" ]; then
              (cd "$dir" && GOWORK=off go list -deps -test ./... >/dev/null)
            else
              (cd "$dir" && go list -deps -test ./... >/dev/null)
            fi
          done

      - name: Validate, commit, and push sync result
        run: |
          # Allowlist: only Go module metadata may change.
          #   go.mod, go.sum, go.work.sum at the root, and go.mod / go.sum
          #   under any nested module directory. Anything else (tracked or
          #   untracked) means scripts/sync.sh produced unexpected drift —
          #   refuse to commit/push so a human inspects the diff.
          #
          # NUL-delimited path streams: git status's text format collapses
          # whitespace and quotes special names, so awk-on-status would
          # mis-parse a path like `weird name/something.go`. Pairing
          # `git diff --name-only -z HEAD` (tracked changes, incl. deletes)
          # with `git ls-files --others --exclude-standard -z` (untracked)
          # gives a clean NUL-terminated stream of one literal path each.
          validate_diff_allowlist() {
            local violators
            violators=$(
              {
                git diff --name-only -z HEAD
                git ls-files --others --exclude-standard -z
              } | while IFS= read -r -d '' path; do
                  # Parenthesize case arms so bash doesn't read the
                  # unbalanced `)` as closing the enclosing $( … ).
                  case "$path" in
                    (go.mod|go.sum|go.work.sum) ;;
                    (*/go.mod|*/go.sum) ;;
                    ("") ;;
                    (*) printf '%s\n' "$path" ;;
                  esac
                done
            )
            if [ -n "$violators" ]; then
              echo "ERROR: scripts/sync.sh changed files outside the allowlist:"
              echo "$violators"
              echo
              echo "Full git status:"
              git status --porcelain --untracked-files=all
              exit 1
            fi
          }

          add_allowlisted() {
            # Stage only the Go module metadata paths the allowlist covers.
            # `git add -A` would also pick up any unexpected drift that
            # somehow slipped past the allowlist check above.
            git ls-files -z --modified --others --exclude-standard \
              -- 'go.mod' 'go.sum' 'go.work.sum' '*/go.mod' '*/go.sum' \
              | xargs -0 -r git add --
          }

          commit_msg() {
            printf '%s\n\n%s\n' \
              'chore(deps): sync Go module metadata' \
              'Run scripts/sync.sh after Renovate dependency update.'
          }

          # Auth for `git push` is configured by actions/checkout
          # (URL-scoped Basic extraheader with `x-access-token:<PAT>`),
          # so a plain `git push` works. The Verify PAT push auth
          # step above guards against PAT/auth regressions before
          # we reach this point.
          git_push() {
            git push origin "HEAD:${GITHUB_REF_NAME}"
          }

          # ---- first pass: validate, commit, push ----
          validate_diff_allowlist

          if [ -z "$(git status --porcelain --untracked-files=all)" ]; then
            echo "No diff after scripts/sync.sh; nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          add_allowlisted
          if git diff --cached --quiet; then
            echo "Nothing staged after allowlisted add; treating as no-op."
            exit 0
          fi
          git commit -m "$(commit_msg)"

          if git_push; then
            exit 0
          fi

          # ---- single retry on non-fast-forward ----
          echo "Initial push rejected; attempting one rebase/retry."
          git fetch origin "${GITHUB_REF_NAME}"
          git reset --hard "origin/${GITHUB_REF_NAME}"
          ./scripts/sync.sh
          validate_diff_allowlist
          if [ -z "$(git status --porcelain --untracked-files=all)" ]; then
            echo "Sync is a no-op on top of remote; nothing to push."
            exit 0
          fi
          add_allowlisted
          if git diff --cached --quiet; then
            echo "Nothing staged after retry; nothing to push."
            exit 0
          fi
          git commit -m "$(commit_msg)"
          if ! git_push; then
            echo "ERROR: push still rejected after one retry; aborting."
            exit 1
          fi
