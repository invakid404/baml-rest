name: Renovate Go Module Sync

on:
  push:
    branches:
      - "renovate/**"

concurrency:
  group: renovate-sync-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.3"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    if: github.event.head_commit.author.name != 'github-actions[bot]'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          # Don't persist the default GITHUB_TOKEN into .git/config.
          # The push step below injects RENOVATE_SYNC_TOKEN via a
          # `-c extraheader` at push time, so no credential lands on
          # the runner filesystem.
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.sum
            go.work.sum
            **/go.sum

      - name: Run scripts/sync.sh
        run: ./scripts/sync.sh

      - name: Validate, commit, and push sync result
        env:
          # PAT used by git_push() to push the sync commit. The PAT
          # makes the push look like a user push so GitHub reruns
          # normal PR-event CI on the new tip; GITHUB_TOKEN-authored
          # pushes are suppressed to prevent workflow recursion. The
          # token is injected via -c extraheader at push time, so
          # nothing persists in .git/config.
          RENOVATE_SYNC_TOKEN: ${{ secrets.RENOVATE_SYNC_TOKEN }}
        run: |
          # Allowlist: only Go module metadata may change.
          #   go.mod, go.sum, go.work.sum at the root, and go.mod / go.sum
          #   under any nested module directory. Anything else (tracked or
          #   untracked) means scripts/sync.sh produced unexpected drift —
          #   refuse to commit/push so a human inspects the diff.
          #
          # NUL-delimited path streams: git status's text format collapses
          # whitespace and quotes special names, so awk-on-status would
          # mis-parse a path like `weird name/something.go`. Pairing
          # `git diff --name-only -z HEAD` (tracked changes, incl. deletes)
          # with `git ls-files --others --exclude-standard -z` (untracked)
          # gives a clean NUL-terminated stream of one literal path each.
          validate_diff_allowlist() {
            local violators
            violators=$(
              {
                git diff --name-only -z HEAD
                git ls-files --others --exclude-standard -z
              } | while IFS= read -r -d '' path; do
                  # Parenthesize case arms so bash doesn't read the
                  # unbalanced `)` as closing the enclosing $( … ).
                  case "$path" in
                    (go.mod|go.sum|go.work.sum) ;;
                    (*/go.mod|*/go.sum) ;;
                    ("") ;;
                    (*) printf '%s\n' "$path" ;;
                  esac
                done
            )
            if [ -n "$violators" ]; then
              echo "ERROR: scripts/sync.sh changed files outside the allowlist:"
              echo "$violators"
              echo
              echo "Full git status:"
              git status --porcelain --untracked-files=all
              exit 1
            fi
          }

          add_allowlisted() {
            # Stage only the Go module metadata paths the allowlist covers.
            # `git add -A` would also pick up any unexpected drift that
            # somehow slipped past the allowlist check above.
            git ls-files -z --modified --others --exclude-standard \
              -- 'go.mod' 'go.sum' 'go.work.sum' '*/go.mod' '*/go.sum' \
              | xargs -0 -r git add --
          }

          commit_msg() {
            printf '%s\n\n%s\n' \
              'chore(deps): sync Go module metadata' \
              'Run scripts/sync.sh after Renovate dependency update.'
          }

          # Push helper: injects the PAT via an in-memory git
          # extraheader override (-c). The unscoped
          # `http.extraheader` key is required: a URL-scoped key
          # like `http.https://github.com/.extraheader` does not
          # propagate auth through `git -c`, so git falls back to
          # the credential helper and the push fails. The unscoped
          # form is safe here because the override lasts for one
          # `git push` only — no other HTTPS calls run in this
          # command. The token never lands in .git/config and
          # GitHub's log redactor masks it if it ever echoes.
          git_push() {
            if [ -z "${RENOVATE_SYNC_TOKEN:-}" ]; then
              echo "ERROR: RENOVATE_SYNC_TOKEN is unset or empty; cannot push." >&2
              return 1
            fi
            git -c "http.extraheader=AUTHORIZATION: bearer ${RENOVATE_SYNC_TOKEN}" \
              push origin "HEAD:${GITHUB_REF_NAME}"
          }

          # ---- first pass: validate, commit, push ----
          validate_diff_allowlist

          if [ -z "$(git status --porcelain --untracked-files=all)" ]; then
            echo "No diff after scripts/sync.sh; nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          add_allowlisted
          if git diff --cached --quiet; then
            echo "Nothing staged after allowlisted add; treating as no-op."
            exit 0
          fi
          git commit -m "$(commit_msg)"

          if git_push; then
            exit 0
          fi

          # ---- single retry on non-fast-forward ----
          echo "Initial push rejected; attempting one rebase/retry."
          git fetch origin "${GITHUB_REF_NAME}"
          git reset --hard "origin/${GITHUB_REF_NAME}"
          ./scripts/sync.sh
          validate_diff_allowlist
          if [ -z "$(git status --porcelain --untracked-files=all)" ]; then
            echo "Sync is a no-op on top of remote; nothing to push."
            exit 0
          fi
          add_allowlisted
          if git diff --cached --quiet; then
            echo "Nothing staged after retry; nothing to push."
            exit 0
          fi
          git commit -m "$(commit_msg)"
          if ! git_push; then
            echo "ERROR: push still rejected after one retry; aborting."
            exit 1
          fi
